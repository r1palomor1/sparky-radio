<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPARKY · Internet Radio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0c0f;
    --panel:     #0f1218;
    --border:    #1e2730;
    --accent:    #00e5ff;
    --accent2:   #ff6b35;
    --green:     #39ff14;
    --fav:       #ffd700;
    --text:      #c8d8e8;
    --dim:       #4a5a6a;
    --subdim:    #2a3a4a;
    --viz-bg:    #060a0e;
    --np-bg:     #0b0f14;
    --ctrl-bg:   #0d1218;
    --pl-bg:     #080c10;
    --pl-hover:  #0f1820;
    --pl-active: #0a1e2a;
    --pl-footer: #0d1218;
    --seek-bg:   #1a2530;
    --tab-bg:    #090d12;
    --tab-active:#0f1e28;
    --grid-line: #0d1520;
    --glow:      0 0 8px #00e5ff88, 0 0 20px #00e5ff33;
    --glow2:     0 0 8px #39ff1488, 0 0 20px #39ff1433;
    --glowfav:   0 0 8px #ffd70088, 0 0 20px #ffd70033;
  }

  body.light {
    --bg:        #e8edf2;
    --panel:     #f4f7fa;
    --border:    #bfcdd8;
    --accent:    #0077aa;
    --accent2:   #e05520;
    --green:     #1a8800;
    --fav:       #b87800;
    --text:      #1a2a3a;
    --dim:       #7a8a9a;
    --subdim:    #c0cad4;
    --viz-bg:    #dce4ec;
    --np-bg:     #edf1f6;
    --ctrl-bg:   #e8edf2;
    --pl-bg:     #f0f4f8;
    --pl-hover:  #e2eaf2;
    --pl-active: #cde4f2;
    --pl-footer: #e8edf2;
    --seek-bg:   #bfcdd8;
    --tab-bg:    #e2eaf0;
    --tab-active:#d0e4f0;
    --grid-line: #d8e2ea;
    --glow:      0 0 6px #0077aa55;
    --glow2:     0 0 6px #1a880055;
    --glowfav:   0 0 6px #b8780055;
  }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, color-mix(in srgb, var(--accent) 8%, transparent) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent 0px, transparent 39px, var(--grid-line) 39px, var(--grid-line) 40px),
      repeating-linear-gradient(90deg, transparent 0px, transparent 39px, var(--grid-line) 39px, var(--grid-line) 40px);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    padding: 20px;
    transition: background-color 0.3s, color 0.3s;
  }

  .app {
    width: 100%; max-width: 520px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    box-shadow: 0 0 40px color-mix(in srgb, var(--accent) 8%, transparent), 0 20px 60px #00000050, inset 0 1px 0 #ffffff08;
    position: relative; overflow: hidden;
    transition: background 0.3s, border-color 0.3s;
  }

  .app::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), #fff, var(--accent), transparent);
    animation: scanline 3s ease-in-out infinite; z-index: 10;
  }
  @keyframes scanline { 0%,100%{opacity:.6} 50%{opacity:1} }

  /* HEADER */
  .header {
    background: var(--ctrl-bg); border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }

  .logo { display: flex; flex-direction: column; gap: 2px; }
  .logo-title {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: 22px; letter-spacing: 6px;
    color: var(--accent); text-shadow: var(--glow); line-height: 1;
  }
  .logo-sub { font-size: 9px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; }

  .header-right { display: flex; align-items: center; gap: 14px; }

  /* THEME TOGGLE */
  .theme-toggle {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; user-select: none;
  }
  .toggle-track {
    width: 38px; height: 20px;
    background: var(--subdim); border-radius: 10px;
    position: relative; transition: background 0.3s;
    border: 1px solid var(--border);
  }
  .toggle-track.on { background: var(--accent); }
  .toggle-thumb {
    width: 14px; height: 14px; background: #fff; border-radius: 50%;
    position: absolute; top: 2px; left: 3px;
    transition: left .25s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 1px 3px #00000050;
  }
  .toggle-track.on .toggle-thumb { left: 21px; }
  .toggle-icon { font-size: 13px; line-height: 1; }

  /* STATUS */
  .status-cluster { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .status-dot { display: flex; align-items: center; gap: 6px; font-size: 9px; letter-spacing: 2px; color: var(--dim); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); transition: all .3s; }
  .dot.active    { background: var(--green); box-shadow: var(--glow2); animation: pulse 1.5s infinite; }
  .dot.buffering { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse .5s infinite; }
  .dot.error     { background: #ff3030; box-shadow: 0 0 8px #ff303088; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-text { color: var(--text); }

  /* VISUALIZER */
  .visualizer {
    height: 36px; background: var(--viz-bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: 2px; padding: 4px 16px; overflow: hidden;
  }
  .bar {
    flex: 1; background: linear-gradient(to top, var(--accent), var(--green));
    border-radius: 1px 1px 0 0; height: 4px; transition: height .1s ease; opacity: .8;
  }

  /* NOW PLAYING */
  .now-playing { padding: 14px 16px 10px; background: var(--np-bg); border-bottom: 1px solid var(--border); }
  .np-label { font-size: 8px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-bottom: 6px; }
  .np-ticker { overflow: hidden; white-space: nowrap; margin-bottom: 4px; }
  .np-name {
    font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700;
    color: var(--accent); text-shadow: var(--glow);
    display: inline-block; animation: ticker 15s linear infinite; animation-play-state: paused;
  }
  .np-name.running { animation-play-state: running; }
  @keyframes ticker { 0%{transform:translateX(100%)} 100%{transform:translateX(-100%)} }
  .np-meta { display: flex; gap: 16px; font-size: 9px; color: var(--dim); letter-spacing: 1px; flex-wrap: wrap; }
  .np-meta span { color: var(--text); }

  /* TIME BAR */
  .time-bar {
    padding: 8px 16px; background: var(--np-bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .time-display {
    font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700;
    color: var(--green); text-shadow: var(--glow2); min-width: 72px; letter-spacing: 2px;
  }
  .seek-track {
    flex: 1; height: 4px; background: var(--seek-bg); border-radius: 2px;
    position: relative; cursor: pointer; overflow: hidden;
  }
  .seek-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px; width: 0%; transition: width .5s linear; position: relative;
  }
  .seek-fill::after {
    content: ''; position: absolute; right: 0; top: -2px;
    width: 8px; height: 8px; background: #fff; border-radius: 50%;
    box-shadow: 0 0 6px var(--accent); display: none;
  }
  .seek-track:hover .seek-fill::after { display: block; }
  .vol-group { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--dim); letter-spacing: 1px; }
  input[type=range] {
    -webkit-appearance: none; width: 70px; height: 3px;
    background: var(--seek-bg); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 6px var(--accent); cursor: pointer;
  }

  /* CONTROLS */
  .controls {
    padding: 12px 16px; background: var(--ctrl-bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .ctrl-group { display: flex; align-items: center; gap: 4px; }
  .btn {
    background: var(--np-bg); border: 1px solid var(--border);
    color: var(--dim); font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 1px; cursor: pointer;
    padding: 7px 10px; border-radius: 2px; transition: all .15s;
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }
  .btn:active { transform: scale(.96); }
  .btn-play {
    background: color-mix(in srgb, var(--accent) 12%, var(--panel));
    border-color: var(--accent); color: var(--accent); box-shadow: var(--glow);
    padding: 8px 18px; font-family: 'Orbitron', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
  }
  .btn-play:hover { box-shadow: 0 0 16px color-mix(in srgb,var(--accent) 60%,transparent); }
  .btn-icon { font-size: 14px; }
  .btn.active { border-color: var(--accent2); color: var(--accent2); background: color-mix(in srgb,var(--accent2) 10%,var(--panel)); }
  .btn-sm { padding: 5px 8px; font-size: 9px; letter-spacing: 1.5px; }

  /* TABS */
  .tab-bar { display: flex; background: var(--tab-bg); border-bottom: 1px solid var(--border); }
  .tab {
    flex: 1; padding: 9px 12px;
    font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px;
    color: var(--dim); cursor: pointer; border: none; background: none;
    text-align: center; text-transform: uppercase;
    border-bottom: 2px solid transparent; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab:hover { color: var(--text); background: var(--pl-hover); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--tab-active); }
  .tab.fav-tab.active { color: var(--fav); border-bottom-color: var(--fav); }
  .tab-badge {
    font-size: 8px; padding: 1px 5px;
    background: var(--subdim); border-radius: 8px; color: var(--dim);
    transition: all .2s;
  }
  .tab.active .tab-badge { background: color-mix(in srgb,var(--accent) 20%,transparent); color: var(--accent); }
  .tab.fav-tab.active .tab-badge { background: color-mix(in srgb,var(--fav) 20%,transparent); color: var(--fav); }

  /* SEARCH */
  .search-area {
    padding: 10px 16px; background: var(--np-bg); border-bottom: 1px solid var(--border);
    display: flex; gap: 8px;
  }
  .search-wrap { flex: 1; position: relative; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 12px; pointer-events: none; }
  input[type=text] {
    width: 100%; background: var(--viz-bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 1px; padding: 8px 10px 8px 30px;
    outline: none; border-radius: 2px; transition: border-color .2s;
  }
  input[type=text]:focus { border-color: var(--accent); box-shadow: 0 0 8px color-mix(in srgb,var(--accent) 15%,transparent); }
  input[type=text]::placeholder { color: var(--dim); }
  .btn-search {
    font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
    letter-spacing: 2px; padding: 8px 14px;
    background: color-mix(in srgb,var(--accent) 10%,var(--panel));
    border-color: var(--accent); color: var(--accent);
  }

  /* PLAYLIST HEADER */
  .playlist-header {
    padding: 6px 16px; background: var(--tab-bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .pl-label { font-size: 8px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; }
  .pl-count { font-size: 9px; color: var(--accent); }

  /* PLAYLIST */
  .playlist { height: 200px; overflow-y: auto; background: var(--pl-bg); }
  .playlist::-webkit-scrollbar { width: 4px; }
  .playlist::-webkit-scrollbar-track { background: var(--viz-bg); }
  .playlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .playlist::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .pl-item {
    display: flex; align-items: center;
    padding: 7px 14px 7px 16px; gap: 8px;
    border-bottom: 1px solid var(--tab-bg);
    cursor: pointer; transition: background .1s; position: relative;
  }
  .pl-item:hover { background: var(--pl-hover); }
  .pl-item.active { background: var(--pl-active); border-left: 2px solid var(--accent); padding-left: 14px; }
  .pl-item.active .pl-item-name { color: var(--accent); }

  .pl-num { font-size: 9px; color: var(--dim); min-width: 20px; text-align: right; flex-shrink: 0; }
  .pl-item.active .pl-num { color: var(--green); }
  .pl-item-info { flex: 1; overflow: hidden; min-width: 0; }
  .pl-item-name { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .5px; }
  .pl-item-sub  { font-size: 9px; color: var(--dim); margin-top: 1px; letter-spacing: .5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .pl-badge {
    font-size: 8px; padding: 2px 5px;
    background: var(--tab-bg); border: 1px solid var(--border);
    color: var(--dim); border-radius: 2px; letter-spacing: 1px; flex-shrink: 0;
  }
  .pl-item.active .pl-badge { border-color: var(--accent); color: var(--accent); }

  /* + FAV button */
  .pl-fav {
    font-size: 9px; letter-spacing: .5px;
    color: var(--dim); background: var(--tab-bg);
    border: 1px solid var(--border); border-radius: 2px;
    cursor: pointer; padding: 3px 6px;
    opacity: 0; transition: opacity .15s, color .15s, border-color .15s, box-shadow .15s;
    flex-shrink: 0; font-family: 'Share Tech Mono', monospace; white-space: nowrap;
  }
  .pl-item:hover .pl-fav { opacity: 1; }
  .pl-fav:hover { color: var(--fav) !important; border-color: var(--fav) !important; box-shadow: var(--glowfav); }
  .pl-fav.is-fav { opacity: 1; color: var(--fav); border-color: var(--fav); }

  /* remove button */
  .pl-remove {
    font-size: 12px; color: var(--dim); background: none; border: none;
    cursor: pointer; padding: 2px 4px; opacity: 0;
    transition: opacity .15s, color .15s; flex-shrink: 0;
  }
  .pl-item:hover .pl-remove { opacity: 1; }
  .pl-remove:hover { color: #ff4444; }

  /* empty / loading */
  .pl-empty {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--dim); font-size: 10px; letter-spacing: 2px; gap: 8px;
  }
  .pl-empty-icon { font-size: 28px; opacity: .3; }
  .pl-empty-hint { font-size: 9px; color: var(--dim); margin-top: 2px; }
  .pl-loading {
    height: 100%; display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 10px; letter-spacing: 2px; gap: 10px;
  }
  .spinner { width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite; }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* EQ */
  .eq-panel { padding: 10px 16px; background: var(--tab-bg); border-top: 1px solid var(--border); display: none; }
  .eq-panel.open { display: block; }
  .eq-label { font-size: 8px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-bottom: 10px; }
  .eq-bars { display: flex; align-items: flex-end; gap: 6px; height: 50px; }
  .eq-band { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .eq-freq { font-size:7px; color:var(--dim); white-space:nowrap; }
  .eq-track {
    flex:1; background:var(--seek-bg); border-radius:2px; cursor:pointer;
    position:relative; height:40px; display:flex; align-items:flex-end; overflow:hidden;
  }
  .eq-fill { width:100%; background:linear-gradient(to top,var(--accent),var(--green)); border-radius:2px; transition:height .1s; }

  /* FOOTER */
  .footer {
    padding: 8px 16px; background: var(--pl-footer); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .footer-actions { display: flex; gap: 4px; }
  .footer-meta { font-size: 9px; color: var(--dim); letter-spacing: 1px; text-align: right; }
  .footer-meta span { color: var(--text); }
  .toggle-group { display: flex; gap: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-title">SPARKY</div>
      <div class="logo-sub">Internet Radio Player</div>
    </div>
    <div class="header-right">
      <div class="theme-toggle" id="themeToggle" title="Toggle light / dark mode">
        <span class="toggle-icon">🌙</span>
        <div class="toggle-track" id="toggleTrack"><div class="toggle-thumb"></div></div>
        <span class="toggle-icon">☀️</span>
      </div>
      <div class="status-cluster">
        <div class="status-dot">
          <div class="dot" id="statusDot"></div>
          <span class="status-text" id="statusText">IDLE</span>
        </div>
      </div>
    </div>
  </div>

  <!-- VISUALIZER -->
  <div class="visualizer">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>

  <!-- NOW PLAYING -->
  <div class="now-playing">
    <div class="np-label">Now Playing</div>
    <div class="np-ticker"><div class="np-name" id="npName">— SELECT A STATION —</div></div>
    <div class="np-meta">
      <div>COUNTRY: <span id="npCountry">—</span></div>
      <div>BITRATE: <span id="npBitrate">—</span></div>
      <div>CODEC: <span id="npCodec">—</span></div>
    </div>
  </div>

  <!-- TIME BAR -->
  <div class="time-bar">
    <div class="time-display" id="timeDisplay">00:00</div>
    <div class="seek-track"><div class="seek-fill" id="seekFill"></div></div>
    <div class="vol-group">VOL <input type="range" id="volSlider" min="0" max="100" value="80"></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="ctrl-group">
      <button class="btn btn-icon" id="btnPrev">&#9664;&#9664;</button>
      <button class="btn btn-play" id="btnPlay">&#9654; PLAY</button>
      <button class="btn btn-icon" id="btnStop">&#9632;</button>
      <button class="btn btn-icon" id="btnNext">&#9654;&#9654;</button>
    </div>
    <div class="toggle-group">
      <button class="btn btn-sm" id="btnShuffle">&#9783;</button>
      <button class="btn btn-sm" id="btnRepeat">&#8635;</button>
      <button class="btn btn-sm" id="btnEq">EQ</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab active" id="tabStations" onclick="switchTab('stations')">
      📡 STATIONS <span class="tab-badge" id="stationsBadge">0</span>
    </button>
    <button class="tab fav-tab" id="tabFavs" onclick="switchTab('favs')">
      ★ FAVORITES <span class="tab-badge" id="favsBadge">0</span>
    </button>
  </div>

  <!-- SEARCH (stations only) -->
  <div class="search-area" id="searchArea">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search stations, genres, countries…" />
    </div>
    <button class="btn btn-search" id="btnSearch">SCAN</button>
  </div>

  <!-- PLAYLIST HEADER -->
  <div class="playlist-header">
    <div class="pl-label" id="plLabel">Stations</div>
    <div class="pl-count" id="plCount">0 FOUND</div>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist" id="playlist">
    <div class="pl-empty">
      <div class="pl-empty-icon">📡</div>
      <div>SEARCH TO DISCOVER STATIONS</div>
    </div>
  </div>

  <!-- EQ -->
  <div class="eq-panel" id="eqPanel">
    <div class="eq-label">Equalizer</div>
    <div class="eq-bars" id="eqBars"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-actions">
      <button class="btn btn-sm" id="btnAdd">+ ADD URL</button>
      <button class="btn btn-sm" id="btnRemove">&#9003; DEL</button>
    </div>
    <div class="footer-meta">
      STATIONS: <span id="footerCount">0</span> &nbsp;|&nbsp; FAVS: <span id="footerFavs">0</span>
    </div>
  </div>
</div>

<audio id="audioEl" crossorigin="anonymous"></audio>

<script>
// ══ STATE ══════════════════════════════════
const audioEl = document.getElementById('audioEl');
let stations   = [];
let currentIdx = -1;
let activeTab  = 'stations';
let currentSrc = null;   // the station object currently loaded
let isPlaying  = false;
let shuffle    = false;
let repeat     = false;
let elapsed    = 0, startTime = 0, timerInterval = null, rafId;
let audioCtx, analyser, srcNode;

// ══ THEME ══════════════════════════════════
let isDark = localStorage.getItem('sparky_theme') !== 'light';

function applyTheme() {
  document.body.classList.toggle('light', !isDark);
  document.getElementById('toggleTrack').classList.toggle('on', !isDark);
  localStorage.setItem('sparky_theme', isDark ? 'dark' : 'light');
}
applyTheme();

document.getElementById('themeToggle').addEventListener('click', () => { isDark = !isDark; applyTheme(); });

// ══ FAVORITES (localStorage) ═══════════════
const FAV_KEY = 'sparky_favorites_v2';

function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch { return []; }
}
function saveFavs(f) { localStorage.setItem(FAV_KEY, JSON.stringify(f)); }

function isFav(st) {
  const u = st.url_resolved || st.url;
  return loadFavs().some(f => f.url === u);
}
function addFav(st) {
  const favs = loadFavs(), u = st.url_resolved || st.url;
  if (!favs.some(f => f.url === u)) {
    favs.push({ name: st.name, url: u, bitrate: st.bitrate, codec: st.codec, countrycode: st.countrycode, tags: st.tags||'' });
    saveFavs(favs);
  }
  refreshFavBadge();
}
function removeFavByUrl(u) {
  saveFavs(loadFavs().filter(f => f.url !== u));
  refreshFavBadge();
}
function refreshFavBadge() {
  const n = loadFavs().length;
  document.getElementById('favsBadge').textContent = n;
  document.getElementById('footerFavs').textContent = n;
}

// ══ TABS ═══════════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabStations').classList.toggle('active', tab === 'stations');
  document.getElementById('tabFavs').classList.toggle('active', tab === 'favs');
  document.getElementById('searchArea').style.display = tab === 'stations' ? '' : 'none';
  if (tab === 'stations') {
    document.getElementById('plLabel').textContent = 'Stations';
    renderStations();
  } else {
    document.getElementById('plLabel').textContent = 'Favorites';
    renderFavs();
  }
}

// ══ EQ ════════════════════════════════════
const EQ_FREQS = [60,170,310,600,1000,3000,6000,12000];
const EQ_LABELS= ['60Hz','170Hz','310Hz','600Hz','1kHz','3kHz','6kHz','12kHz'];
const eqNodes  = [], eqVals = new Array(8).fill(0);

EQ_LABELS.forEach((label, i) => {
  const band = document.createElement('div'); band.className = 'eq-band';
  band.innerHTML = `<div class="eq-track" id="eqT${i}"><div class="eq-fill" id="eqF${i}" style="height:50%"></div></div><div class="eq-freq">${label}</div>`;
  document.getElementById('eqBars').appendChild(band);
  document.getElementById('eqT'+i).addEventListener('click', e => {
    const r = document.getElementById('eqT'+i).getBoundingClientRect();
    const p = 1 - (e.clientY - r.top) / r.height;
    eqVals[i] = (p-.5)*24;
    document.getElementById('eqF'+i).style.height = (p*100)+'%';
    if (eqNodes[i]) eqNodes[i].gain.value = eqVals[i];
  });
});

// ══ AUDIO INIT ════════════════════════════
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser  = audioCtx.createAnalyser(); analyser.fftSize = 64;
  srcNode   = audioCtx.createMediaElementSource(audioEl);
  let chain = srcNode;
  EQ_FREQS.forEach((freq, i) => {
    const f = audioCtx.createBiquadFilter();
    f.type = i===0 ? 'lowshelf' : i===7 ? 'highshelf' : 'peaking';
    f.frequency.value = freq; f.gain.value = eqVals[i];
    eqNodes.push(f); chain.connect(f); chain = f;
  });
  chain.connect(analyser); analyser.connect(audioCtx.destination);
}

// ══ VISUALIZER ════════════════════════════
const vizBars = document.querySelectorAll('.visualizer .bar');
const vizData = new Uint8Array(28);

function drawViz() {
  rafId = requestAnimationFrame(drawViz);
  if (!analyser) return;
  analyser.getByteFrequencyData(vizData);
  vizBars.forEach((b,i) => { b.style.height = (4 + (vizData[i]||0)/255*28)+'px'; });
}
function idleViz() {
  cancelAnimationFrame(rafId); let t=0;
  (function tick(){ rafId=requestAnimationFrame(tick); t+=.05;
    vizBars.forEach((b,i)=>{ b.style.height=(4+Math.abs(Math.sin(t+i*.4))*5)+'px'; }); })();
}
idleViz();

// ══ STATUS ════════════════════════════════
function setStatus(state, txt) {
  document.getElementById('statusDot').className = 'dot '+({playing:'active',buffering:'buffering',error:'error'}[state]||'');
  document.getElementById('statusText').textContent = txt.toUpperCase();
}

// ══ TIMER ═════════════════════════════════
function startTimer() {
  clearInterval(timerInterval); startTime = Date.now() - elapsed*1000;
  timerInterval = setInterval(()=>{
    elapsed = (Date.now()-startTime)/1000;
    document.getElementById('timeDisplay').textContent =
      Math.floor(elapsed/60).toString().padStart(2,'0')+':'+Math.floor(elapsed%60).toString().padStart(2,'0');
    document.getElementById('seekFill').style.width = Math.min((elapsed/3600)*100,100)+'%';
  },500);
}
function stopTimer() {
  clearInterval(timerInterval); elapsed=0;
  document.getElementById('timeDisplay').textContent='00:00';
  document.getElementById('seekFill').style.width='0%';
}

// ══ NOW PLAYING ═══════════════════════════
function updateNowPlaying(st) {
  const nm = document.getElementById('npName');
  nm.textContent = st ? st.name : '— SELECT A STATION —';
  nm.className = 'np-name'+(st?' running':'');
  document.getElementById('npCountry').textContent = st?.countrycode||'—';
  document.getElementById('npBitrate').textContent = st?.bitrate ? st.bitrate+' kbps' : '—';
  document.getElementById('npCodec').textContent   = st?.codec||'—';
}

// ══ PLAYBACK ══════════════════════════════
function playStationObj(st) {
  if (!st) return;
  currentSrc = st;
  if (audioCtx?.state==='suspended') audioCtx.resume();
  initAudio();
  audioEl.pause();
  audioEl.src = st.url_resolved || st.url;
  audioEl.volume = document.getElementById('volSlider').value/100;
  setStatus('buffering','BUFFERING');
  updateNowPlaying(st);
  audioEl.play().then(()=>{
    isPlaying=true; setStatus('playing','CONNECTED');
    document.getElementById('btnPlay').innerHTML='&#9646;&#9646; PAUSE';
    startTimer(); cancelAnimationFrame(rafId); drawViz();
  }).catch(()=>{ setStatus('error','ERROR'); document.getElementById('btnPlay').innerHTML='&#9654; PLAY'; });
}

function playAtIndex(idx) {
  const list = activeTab==='favs' ? loadFavs() : stations;
  if (idx<0||idx>=list.length) return;
  currentIdx=idx; playStationObj(list[idx]);
  renderCurrent();
}

function stopPlayback() {
  audioEl.pause(); audioEl.src='';
  isPlaying=false; currentSrc=null;
  setStatus('','IDLE');
  document.getElementById('btnPlay').innerHTML='&#9654; PLAY';
  stopTimer(); idleViz(); renderCurrent();
}

function renderCurrent() { activeTab==='stations' ? renderStations() : renderFavs(); }

// ══ RENDER STATIONS ═══════════════════════
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderStations() {
  const pl = document.getElementById('playlist');
  document.getElementById('plCount').textContent = stations.length+' FOUND';
  document.getElementById('stationsBadge').textContent = stations.length;
  document.getElementById('footerCount').textContent = stations.length;
  if (!stations.length) {
    pl.innerHTML='<div class="pl-empty"><div class="pl-empty-icon">📡</div><div>SEARCH TO DISCOVER STATIONS</div></div>'; return;
  }
  pl.innerHTML = stations.map((st,i) => {
    const url  = st.url_resolved||st.url;
    const actv = currentSrc && (currentSrc.url_resolved||currentSrc.url)===url && activeTab==='stations';
    const favd = isFav(st);
    return `<div class="pl-item${actv?' active':''}" data-idx="${i}">
      <div class="pl-num">${actv?'▶':(i+1).toString().padStart(2,'0')}</div>
      <div class="pl-item-info">
        <div class="pl-item-name">${esc(st.name)}</div>
        <div class="pl-item-sub">${esc(st.countrycode||'')}${st.tags?' · '+esc(st.tags.split(',').slice(0,3).join(', ')):''}
        </div>
      </div>
      <div class="pl-badge">${st.bitrate?st.bitrate+'k':'—'}</div>
      <button class="pl-fav${favd?' is-fav':''}" data-fav="${i}">${favd?'★ FAV':'+ FAV'}</button>
      <button class="pl-remove" data-rm="${i}">✕</button>
    </div>`;
  }).join('');

  pl.querySelectorAll('.pl-item').forEach(el=>{
    el.addEventListener('click', e=>{
      if(e.target.classList.contains('pl-fav')||e.target.classList.contains('pl-remove')) return;
      currentIdx=parseInt(el.dataset.idx); activeTab='stations'; playStationObj(stations[currentIdx]); renderStations();
    });
  });
  pl.querySelectorAll('.pl-fav').forEach(btn=>{
    btn.addEventListener('click', e=>{ e.stopPropagation();
      const st=stations[parseInt(btn.dataset.fav)];
      isFav(st) ? removeFavByUrl(st.url_resolved||st.url) : addFav(st);
      renderStations();
    });
  });
  pl.querySelectorAll('.pl-remove').forEach(btn=>{
    btn.addEventListener('click', e=>{ e.stopPropagation();
      const idx=parseInt(btn.dataset.rm);
      if(currentSrc&&(currentSrc.url_resolved||currentSrc.url)===(stations[idx].url_resolved||stations[idx].url)) stopPlayback();
      stations.splice(idx,1);
      if(currentIdx>=idx) currentIdx=Math.max(-1,currentIdx-1);
      renderStations();
    });
  });
}

// ══ RENDER FAVORITES ══════════════════════
function renderFavs() {
  const pl=document.getElementById('playlist'), favs=loadFavs();
  refreshFavBadge();
  document.getElementById('plCount').textContent = favs.length+' SAVED';
  if (!favs.length) {
    pl.innerHTML='<div class="pl-empty"><div class="pl-empty-icon">★</div><div>NO FAVORITES YET</div><div class="pl-empty-hint">HOVER A STATION AND CLICK + FAV</div></div>'; return;
  }
  pl.innerHTML = favs.map((st,i)=>{
    const actv = currentSrc&&(currentSrc.url_resolved||currentSrc.url)===st.url&&activeTab==='favs';
    return `<div class="pl-item${actv?' active':''}" data-idx="${i}">
      <div class="pl-num">${actv?'▶':(i+1).toString().padStart(2,'0')}</div>
      <div class="pl-item-info">
        <div class="pl-item-name">${esc(st.name)}</div>
        <div class="pl-item-sub">${esc(st.countrycode||'')}${st.tags?' · '+esc(st.tags.split(',').slice(0,3).join(', ')):''}
        </div>
      </div>
      <div class="pl-badge" style="color:var(--fav);border-color:var(--fav)">★</div>
      <button class="pl-remove" data-rmfav="${i}">✕</button>
    </div>`;
  }).join('');

  pl.querySelectorAll('.pl-item').forEach(el=>{
    el.addEventListener('click', e=>{
      if(e.target.classList.contains('pl-remove')) return;
      currentIdx=parseInt(el.dataset.idx); activeTab='favs'; playStationObj(loadFavs()[currentIdx]); renderFavs();
    });
  });
  pl.querySelectorAll('[data-rmfav]').forEach(btn=>{
    btn.addEventListener('click', e=>{ e.stopPropagation();
      const f=loadFavs()[parseInt(btn.dataset.rmfav)];
      if(currentSrc&&(currentSrc.url_resolved||currentSrc.url)===f.url) stopPlayback();
      removeFavByUrl(f.url); renderFavs();
    });
  });
}

// ══ TRANSPORT ═════════════════════════════
document.getElementById('btnPlay').addEventListener('click', ()=>{
  if(audioCtx?.state==='suspended') audioCtx.resume();
  if(!isPlaying){
    if(currentSrc){
      audioEl.play().then(()=>{ isPlaying=true; setStatus('playing','CONNECTED');
        document.getElementById('btnPlay').innerHTML='&#9646;&#9646; PAUSE';
        startTimer(); cancelAnimationFrame(rafId); drawViz(); });
    } else {
      const list=activeTab==='favs'?loadFavs():stations;
      if(list.length){ currentIdx=0; playStationObj(list[0]); renderCurrent(); }
    }
  } else {
    audioEl.pause(); isPlaying=false; setStatus('','PAUSED');
    document.getElementById('btnPlay').innerHTML='&#9654; PLAY';
    clearInterval(timerInterval); idleViz();
  }
});

document.getElementById('btnStop').addEventListener('click', stopPlayback);

document.getElementById('btnNext').addEventListener('click', ()=>{
  const list=activeTab==='favs'?loadFavs():stations; if(!list.length) return;
  playAtIndex(shuffle?Math.floor(Math.random()*list.length):(currentIdx+1)%list.length);
});
document.getElementById('btnPrev').addEventListener('click', ()=>{
  const list=activeTab==='favs'?loadFavs():stations; if(!list.length) return;
  playAtIndex(shuffle?Math.floor(Math.random()*list.length):(currentIdx-1+list.length)%list.length);
});

document.getElementById('btnShuffle').addEventListener('click', function(){ shuffle=!shuffle; this.classList.toggle('active',shuffle); });
document.getElementById('btnRepeat').addEventListener('click', function(){ repeat=!repeat; this.classList.toggle('active',repeat); audioEl.loop=repeat; });
document.getElementById('btnEq').addEventListener('click', function(){
  const p=document.getElementById('eqPanel'); p.classList.toggle('open'); this.classList.toggle('active',p.classList.contains('open'));
});
document.getElementById('volSlider').addEventListener('input', function(){ audioEl.volume=this.value/100; });

audioEl.addEventListener('ended', ()=>{
  if(!repeat){ const list=activeTab==='favs'?loadFavs():stations; if(list.length) playAtIndex(shuffle?Math.floor(Math.random()*list.length):(currentIdx+1)%list.length); else stopPlayback(); }
});
audioEl.addEventListener('error', ()=>{ setStatus('error','STREAM ERROR'); isPlaying=false; document.getElementById('btnPlay').innerHTML='&#9654; PLAY'; idleViz(); });
audioEl.addEventListener('waiting', ()=>setStatus('buffering','BUFFERING'));
audioEl.addEventListener('playing', ()=>setStatus('playing','CONNECTED'));

// ══ SEARCH ════════════════════════════════
async function searchStations(q) {
  document.getElementById('playlist').innerHTML='<div class="pl-loading"><div class="spinner"></div>SCANNING...</div>';
  document.getElementById('plCount').textContent='SCANNING...';
  const servers=['de1.api.radio-browser.info','nl1.api.radio-browser.info','at1.api.radio-browser.info'];
  const srv=servers[Math.floor(Math.random()*servers.length)];
  try {
    const r=await fetch(`https://${srv}/json/stations/search?`+new URLSearchParams({name:q,limit:60,hidebroken:true,order:'clickcount',reverse:true}),{headers:{'User-Agent':'SPARKY-RadioPlayer/1.0'}});
    if(!r.ok) throw 0;
    stations=(await r.json()).filter(s=>s.url_resolved||s.url);
    renderStations();
  } catch {
    document.getElementById('playlist').innerHTML='<div class="pl-empty"><div class="pl-empty-icon">⚠</div><div>CONNECTION FAILED — RETRY</div></div>';
    document.getElementById('plCount').textContent='ERROR';
  }
}

document.getElementById('btnSearch').addEventListener('click', ()=>{
  const q=document.getElementById('searchInput').value.trim();
  if(q){ switchTab('stations'); searchStations(q); }
});
document.getElementById('searchInput').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ const q=e.target.value.trim(); if(q){ switchTab('stations'); searchStations(q); } }
});

document.getElementById('btnAdd').addEventListener('click', ()=>{
  const url=prompt('Enter stream URL:'); if(!url) return;
  const name=prompt('Station name:','Custom Station');
  stations.push({name:name||'Custom Station',url_resolved:url,url,bitrate:'',codec:'',countrycode:'',tags:''});
  switchTab('stations');
});
document.getElementById('btnRemove').addEventListener('click', ()=>{
  if(currentIdx<0) return;
  if(activeTab==='favs'){ const f=loadFavs()[currentIdx]; removeFavByUrl(f.url); stopPlayback(); renderFavs(); }
  else { stations.splice(currentIdx,1); stopPlayback(); renderStations(); }
});

// ══ INIT ══════════════════════════════════
refreshFavBadge();
searchStations('jazz');
</script>
</body>
</html>
