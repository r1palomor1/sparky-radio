<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPARKY · Internet Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="material-symbols.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #181614;
      --panel: #222020;
      --panel2: #282624;
      --border: #343030;
      --accent: #5cb870;
      --accent2: #e86030;
      --green: #80d090;
      --fav: #e8c840;
      --text: #ece8e0;
      --dim: #ece8e0;
      --subdim: #2e2a26;
      --viz-bg: #131210;
      --np-bg: #1e1c1a;
      --ctrl-bg: #1a1816;
      --pl-bg: #1c1a18;
      --pl-hover: #262220;
      --pl-active: #1e2a1e;
      --pl-footer: #1a1816;
      --seek-bg: #302c28;
      --tab-bg: #1a1816;
      --tab-active: #1e1c1a;
      --grid-line: #201e1c;
      --glow: 0 0 8px #5cb87088, 0 0 20px #5cb87033;
      --glow2: 0 0 8px #80d09088, 0 0 20px #80d09033;
      --glowfav: 0 0 8px #e8c84088, 0 0 20px #e8c84033;
      --app-border: #5e5248;
      --app-shadow: 0 8px 40px #00000080;
    }

    body.light {
      --bg: #5a5848;
      --panel: #b8b4a0;
      --panel2: #b2ae9c;
      --border: #8e8a78;
      --accent: #051a08;
      --accent2: #c83820;
      --green: #000000;
      --fav: #5a3800;
      --text: #0c0800;
      --dim: #0c0800;
      --subdim: #9a9684;
      --viz-bg: #9e9a88;
      --np-bg: #bcb8a6;
      --ctrl-bg: #b0ac9a;
      --pl-bg: #b6b2a0;
      --pl-hover: #c0bca8;
      --pl-active: #d0dbc8;
      --pl-footer: #b0ac9a;
      --seek-bg: #8a8674;
      --tab-bg: #aca896;
      --tab-active: #b8b4a2;
      --grid-line: #524e40;
      --glow: 0 0 6px #2a7a3a66;
      --glow2: 0 0 6px #18682866;
      --glowfav: 0 0 6px #90680066;
      --app-border: #707060;
      --app-shadow: 0 4px 24px #00000040;
    }

    body {
      background: var(--bg);
      background-image:
        repeating-linear-gradient(0deg, transparent 0px, transparent 39px, var(--grid-line) 39px, var(--grid-line) 40px),
        repeating-linear-gradient(90deg, transparent 0px, transparent 39px, var(--grid-line) 39px, var(--grid-line) 40px);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text);
      padding: 20px;
      transition: background-color 0.3s, color 0.3s;
    }

    .app {
      width: 100%;
      max-width: 400px;
      background: var(--panel);
      border: 2px solid var(--app-border);
      box-shadow: var(--app-shadow);
      border-radius: 3px;
      position: relative;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }

    /* ── RESPONSIVE ─────────────────────────── */
    /* Tablet: fill height, wider card */
    @media (min-width: 600px) and (max-width: 1023px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .app {
        max-width: min(94vw, 580px);
        min-height: calc(100dvh - 24px);
        display: flex;
        flex-direction: column;
      }

      .playlist {
        flex: 1;
        height: auto;
        min-height: 170px;
        max-height: 320px;
      }
    }

    /* Mobile: full-height, internal playlist scroll */
    @media (max-width: 599px) {
      body {
        align-items: stretch;
        padding: 0;
        overflow: hidden;
      }

      .app {
        max-width: 100%;
        height: 100dvh;
        border-left: none;
        border-right: none;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .playlist {
        flex: 1;
        min-height: 0;
        height: 0;
        overflow-y: auto;
      }

      .logo-title {
        font-size: 13px;
        letter-spacing: 2px;
        white-space: nowrap;
      }
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      background: var(--ctrl-bg);
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo-title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 17px;
      letter-spacing: 4px;
      color: var(--text);
      line-height: 1;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* THEME TOGGLE */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-track {
      width: 32px;
      height: 18px;
      background: var(--subdim);
      border-radius: 9px;
      position: relative;
      transition: background 0.3s;
      border: 1px solid var(--border);
    }

    .toggle-track.on {
      background: var(--accent);
    }

    .toggle-thumb {
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: left .25s cubic-bezier(.4, 0, .2, 1);
      box-shadow: 0 1px 3px #00000050;
    }

    .toggle-track.on .toggle-thumb {
      left: 17px;
    }

    .toggle-icon {
      font-size: 11px;
      line-height: 1;
    }

    /* STATUS */
    .status-cluster {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .status-cluster:hover #statusText {
      color: var(--accent);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text);
      transition: all .3s;
      flex-shrink: 0;
    }

    .dot.active {
      background: var(--accent);
      box-shadow: var(--glow);
      animation: pulse 1.5s infinite;
    }

    .dot.buffering {
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      animation: pulse .5s infinite;
    }

    .dot.error {
      background: #ff5050;
      box-shadow: 0 0 8px #ff505088;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    #statusText {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text);
      font-weight: 500;
      transition: color 0.1s;
    }

    /* ── VISUALIZER (compact strip below header) ── */
    .visualizer {
      height: 32px;
      background: var(--viz-bg);
      border: 1px solid var(--border);
      border-top: none;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      padding: 0;
      overflow: hidden;
      width: 60%;
      margin: 0 auto;
      justify-content: center;
      border-radius: 0 0 4px 4px;
    }

    .bar {
      flex: 1;
      background: linear-gradient(to top, #2a5c34, var(--accent), var(--green));
      border-radius: 1px 1px 0 0;
      height: 4px;
      transition: height .08s ease;
      opacity: .9;
    }

    /* ── NOW PLAYING ────────────────────────── */
    .now-playing {
      padding: 10px 14px 8px;
      background: var(--np-bg);
      border-bottom: 1px solid var(--border);
    }

    .np-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .np-label {
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--text);
      text-transform: uppercase;
      font-weight: 500;
      opacity: 0.9;
      margin: 0;
    }

    .np-ticker {
      overflow: hidden;
      white-space: nowrap;
      margin-bottom: 5px;
    }

    .np-name {
      font-family: 'Orbitron', monospace;
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      display: inline-block;
      animation: ticker 15s linear infinite;
      animation-play-state: paused;
      letter-spacing: .5px;
    }

    .np-name.running {
      animation-play-state: running;
    }

    @keyframes ticker {
      0% {
        transform: translateX(100%)
      }

      100% {
        transform: translateX(-100%)
      }
    }

    .np-meta {
      display: flex;
      gap: 4px;
      font-size: 11px;
      color: var(--text);
      letter-spacing: 0.5px;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      font-weight: 600;
      margin-top: 8px;
      overflow: hidden;
    }

    .np-meta-badge {
      background: var(--ctrl-bg);
      padding: 4px 6px;
      border-radius: 2px;
      border: 1px solid var(--border);
      font-size: 10px;
      color: var(--text);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .np-meta-badge i {
      font-style: normal;
      filter: grayscale(0.5);
    }

    .pl-status-badge {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 2px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 6px;
    }

    .pl-status-badge.hot {
      background: #ff4500;
      color: #fff;
    }

    .pl-status-badge.trending {
      background: #00ced1;
      color: #080808;
    }

    .pl-badge-group {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-right: 8px;
    }

    .pl-badge-mini {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 1px 4px;
      background: var(--subdim);
      border-radius: 2px;
      color: var(--text);
      border: 1px solid var(--border);
      white-space: nowrap;
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .pl-badge-mini i {
      font-style: normal;
      font-size: 10px;
    }

    .np-ticker {
      display: flex;
      align-items: center;
      width: 100%;
      overflow: hidden;
      margin-top: 10px;
    }

    .np-name-wrap {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }

    .np-name {
      display: inline-block;
      font-size: 20px;
      font-weight: 900;
      color: var(--text);
      padding-right: 50px;
      text-transform: uppercase;
      font-family: 'Orbitron', sans-serif;
    }

    .volume-bar {
      padding: 12px 14px;
      background: var(--np-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .vol-group {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--text);
      letter-spacing: 2px;
      font-weight: 700;
      width: 60%;
    }

    input[type=range] {
      appearance: none;
      -webkit-appearance: none;
      flex: 1;
      height: 3px;
      background: var(--seek-bg);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 5px var(--accent);
    }

    /* ── CONTROLS ───────────────────────────── */
    .controls {
      padding: 10px 14px;
      background: var(--ctrl-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn {
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      padding: 7px 12px;
      border-radius: 2px;
      transition: all .15s;
      opacity: 0.85;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn:active {
      transform: scale(.96);
    }

    .btn-play {
      background: var(--panel2);
      border-color: var(--border);
      color: var(--text);
      padding: 8px 22px;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .btn-play:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-icon {
      font-size: 14px;
      padding: 7px 10px;
    }

    .btn.active {
      border-color: var(--accent2);
      color: var(--accent2);
      background: color-mix(in srgb, var(--accent2) 10%, var(--panel));
    }

    .btn-sm {
      padding: 5px 9px;
      font-size: 10px;
      letter-spacing: 1.5px;
      font-weight: 500;
    }

    /* Hidden JS-compat buttons (Shuffle, Repeat, EQ — logic preserved, UI removed) */
    .toggle-group {
      display: none !important;
    }

    /* ── TAB + SEARCH COMBINED ROW ──────────── */
    .tab-search-row {
      display: flex;
      flex-direction: column;
      background: var(--tab-bg);
      border-bottom: 1px solid var(--border);
    }

    .tab-bar {
      display: flex;
      width: 100%;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 10px 11px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--text);
      cursor: pointer;
      border: none;
      background: none;
      text-align: center;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      white-space: nowrap;
      font-weight: 600;
      opacity: 0.6;
    }

    .tab:hover {
      color: var(--text);
      opacity: 1;
    }

    .tab.active {
      color: var(--fav);
      border-bottom-color: var(--fav);
      background: var(--tab-active);
      opacity: 1;
    }

    .tab.fav-tab.active {
      color: var(--fav);
      border-bottom-color: var(--fav);
    }

    .tab-badge {
      font-size: 10px;
      padding: 1px 5px;
      background: var(--subdim);
      border-radius: 8px;
      color: var(--text);
      transition: all .2s;
      font-weight: 600;
    }

    .tab.active .tab-badge {
      background: color-mix(in srgb, var(--fav) 20%, transparent);
      color: var(--fav);
    }

    .tab.fav-tab.active .tab-badge {
      background: color-mix(in srgb, var(--fav) 20%, transparent);
      color: var(--fav);
    }

    .search-area {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text);
      font-size: 11px;
      pointer-events: none;
    }

    input[type=text] {
      width: 100%;
      background: var(--subdim);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .5px;
      padding: 6px 30px 6px 26px;
      outline: none;
      border-radius: 2px;
      transition: border-color .2s;
    }

    input[type=text]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 6px color-mix(in srgb, var(--accent) 15%, transparent);
    }

    input[type=text]::placeholder {
      color: var(--text);
      opacity: 0.6;
    }

    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: color .2s;
    }

    .search-clear:hover {
      color: var(--accent2);
    }

    .btn-search {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      padding: 5px 10px;
      white-space: nowrap;
      font-weight: 500;
    }

    /* ── PLAYLIST HEADER ────────────────────── */
    .playlist-header {
      background: var(--ctrl-bg);
      height: 26px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      padding: 0;
    }

    .pl-header-left {
      display: flex;
      align-items: stretch;
      height: 100%;
      flex: 1;
      overflow: hidden;
    }

    .pl-sort-btn {
      width: 28px;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      position: relative;
    }

    .pl-sort-btn:hover {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
    }

    .pl-sort-btn .material-symbols-outlined {
      font-size: 14px;
    }

    .pl-sort-tooltip {
      position: absolute;
      left: 34px;
      top: 0;
      background: var(--panel);
      border: 1px solid var(--accent);
      color: var(--text);
      font-size: 10px;
      padding: 8px 12px;
      border-radius: 2px;
      display: none;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      font-family: 'Share Tech Mono', monospace;
      line-height: 1;
      letter-spacing: 0.5px;
    }

    .pl-sort-tooltip.show {
      display: flex;
    }

    .pl-sort-row {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.4;
      white-space: nowrap;
      transition: opacity .15s;
    }

    .pl-sort-row.active {
      opacity: 1;
      color: var(--accent);
    }

    .pl-sort-row .material-symbols-outlined {
      font-size: 14px;
      width: 16px;
      text-align: center;
    }

    .pl-sort-row .sort-desc {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 9px;
    }

    .pl-label {
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text);
      opacity: 0.9;
    }

    .pl-count {
      height: 100%;
      display: flex;
      align-items: center;
      padding-right: 14px;
      color: var(--text);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      opacity: 1;
    }

    /* ── PLAYLIST ───────────────────────────── */
    .playlist {
      height: 170px;
      overflow-y: auto;
      background: var(--pl-bg);
    }

    .playlist::-webkit-scrollbar {
      width: 3px;
    }

    .playlist::-webkit-scrollbar-track {
      background: var(--viz-bg);
    }

    .playlist::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .playlist::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    .pl-item {
      display: flex;
      align-items: stretch;
      padding: 0;
      background: var(--pl-item);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      min-height: 58px;
      overflow: hidden;
    }

    .pl-sidebar {
      width: 28px;
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pl-sidebar .btn-stack {
      width: 100%;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 0;
    }

    .pl-sidebar .btn-stack:hover {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
    }

    .pl-num {
      font-size: 11px;
      color: var(--text);
      font-weight: 500;
      opacity: 1;
      margin: 4px 0;
      transition: color 0.3s;
      letter-spacing: 2px;
    }

    .pl-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8px 12px;
      overflow: hidden;
    }

    .pl-item-name {
      font-weight: 500;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .pl-item-sub-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      overflow: hidden;
    }

    .pl-item-sub {
      font-size: 10px;
      color: var(--text);
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .pl-end {
      width: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      flex-shrink: 0;
    }

    .pl-item.active {
      background: var(--pl-active);
    }

    .pl-item.active .pl-sidebar {
      background: var(--accent);
      color: var(--bg);
      border: none;
    }

    .pl-item.active .pl-sidebar .btn-stack,
    .pl-item.active .pl-num {
      color: var(--bg);
    }


    .pl-badge {
      font-size: 10px;
      padding: 2px 5px;
      background: var(--tab-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 2px;
      letter-spacing: 1px;
      flex-shrink: 0;
      font-weight: 700;
    }

    .pl-item.active .pl-badge {
      border-color: var(--accent);
      color: var(--text);
    }

    /* + FAV button */
    .pl-fav {
      font-size: 10px;
      letter-spacing: .5px;
      color: var(--text);
      background: var(--tab-bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
      padding: 3px 7px;
      opacity: 1;
      transition: color .15s, border-color .15s, box-shadow .15s;
      flex-shrink: 0;
      font-family: 'Share Tech Mono', monospace;
      white-space: nowrap;
      margin-left: 4px;
      font-weight: 500;
    }

    .pl-fav:hover {
      color: var(--fav) !important;
      border-color: var(--fav) !important;
      box-shadow: var(--glowfav);
    }

    .pl-fav.is-fav {
      color: var(--fav);
      border-color: var(--fav);
    }

    .pl-edit {
      font-size: 12px;
      color: var(--text);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      opacity: 1;
      transition: color .15s, opacity .15s;
      flex-shrink: 0;
      margin-left: 2px;
    }

    .pl-edit:hover {
      color: var(--accent);
      opacity: 1;
    }

    /* remove button */
    .pl-remove {
      font-size: 12px;
      color: var(--text);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      opacity: 0.8;
      transition: opacity .15s, color .15s;
      flex-shrink: 0;
    }

    .pl-item:hover .pl-remove {
      opacity: 1;
    }

    .pl-remove:hover {
      color: #e04040;
    }

    /* empty / loading */
    .pl-empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 11px;
      letter-spacing: 2px;
      gap: 8px;
      font-weight: 700;
    }

    .pl-empty-icon {
      font-size: 28px;
      opacity: .5;
      color: var(--accent);
    }

    .pl-empty-hint {
      font-size: 10px;
      color: var(--text);
      margin-top: 2px;
      opacity: 0.8;
    }

    .pl-loading {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 10px;
      letter-spacing: 2px;
      gap: 10px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* ── EQ RACK ────────────────────────────── */
    .eq-rack {
      max-height: 0;
      overflow: hidden;
      background: var(--viz-bg);
      border-bottom: 2px solid var(--border);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
    }

    .eq-rack.open {
      max-height: 320px;
      padding: 20px;
      opacity: 1;
    }

    .eq-row {
      display: flex;
      align-items: stretch;
      gap: 8px;
      height: 100px;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .eq-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .eq-slider-box {
      flex: 1;
      width: 18px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      position: relative;
      cursor: pointer;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .eq-slider-box::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--accent);
      opacity: 0.45;
      pointer-events: none;
      box-shadow: 0 0 4px var(--accent);
    }

    .eq-fader {
      position: absolute;
      left: -3px;
      width: 24px;
      height: 10px;
      background: var(--accent);
      border-radius: 2px;
      box-shadow: 0 0 12px var(--accent), 0 1px 2px rgba(0, 0, 0, 0.5);
      bottom: 50%;
      transform: translateY(50%);
      transition: bottom 0.1s linear;
      z-index: 2;
    }

    .eq-fader::after {
      content: attr(data-db);
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel);
      color: var(--accent);
      border: 1.5px solid var(--accent);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 900;
      opacity: 0;
      transition: opacity 0.1s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
      font-family: 'Share Tech Mono', monospace;
      z-index: 10;
    }

    .eq-fader:hover::after,
    .eq-slider-box:active .eq-fader::after {
      opacity: 1;
    }

    .eq-label-freq {
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .eq-scale-side {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100px;
      padding-bottom: 15px;
      font-size: 7px;
      color: var(--dim);
      font-weight: bold;
      opacity: 0.7;
      text-align: center;
      width: 22px;
    }

    .eq-presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    .btn-preset {
      padding: 6px 4px;
      font-size: 10px;
      letter-spacing: 1.5px;
      background: var(--bg);
      font-weight: 700;
      opacity: 0.9;
      border-radius: 3px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .btn-preset.active {
      border-color: var(--fav);
      color: var(--fav);
      background: color-mix(in srgb, var(--fav) 10%, var(--bg));
      box-shadow: 0 0 10px rgba(144, 104, 0, 0.2);
    }

    .eq-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn-action {
      padding: 8px;
      font-size: 11px;
      letter-spacing: 2px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .btn-save {
      border-color: var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 15%, var(--bg));
    }

    .btn-reset {
      border-color: var(--accent2);
      color: var(--accent2);
      background: color-mix(in srgb, var(--accent2) 15%, var(--bg));
      opacity: 0.8;
    }

    /* ── MODALS ─────────────────────────────── */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-content {
      background: var(--panel);
      border: 1px solid var(--accent);
      padding: 20px;
      width: 90%;
      max-width: 320px;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      font-family: 'Share Tech Mono', monospace;
    }

    .modal-header {
      font-size: 10px;
      color: var(--accent);
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 5px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 15px;
    }

    /* ── FOOTER ─────────────────────────────── */
    .footer {
      padding: 8px 14px;
      background: var(--pl-footer);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .footer-actions {
      display: flex;
      gap: 5px;
    }

    .footer-meta {
      font-size: 11px;
      color: var(--text);
      letter-spacing: 2px;
      white-space: nowrap;
      font-weight: 500;
    }

    .footer-meta span {
      color: #ece8e0;
      margin: 0 2px;
      font-weight: 500;
    }

    body.light .footer-meta span {
      color: #000;
    }

    /* ── STATION CARD ───────────────────────── */
    .station-card {
      min-height: 86px;
      background: var(--viz-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 10px 14px;
      gap: 14px;
    }

    .sc-idle {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      font-size: 10px;
      letter-spacing: 2px;
      gap: 6px;
      opacity: .4;
      font-weight: 600;
    }

    .sc-idle-icon {
      font-size: 22px;
    }

    .sc-art {
      flex-shrink: 0;
      width: 62px;
      height: 62px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--subdim);
    }

    .sc-favicon {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sc-initials {
      width: 62px;
      height: 62px;
      background: var(--subdim);
      color: var(--accent);
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sc-info {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .sc-meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .sc-meta-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 2px;
      background: var(--subdim);
      color: var(--dim);
      border: 1px solid var(--border);
      letter-spacing: .5px;
      font-weight: 600;
    }

    .sc-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .sc-tag {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      letter-spacing: .5px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .sc-link {
      font-size: 15px;
      text-decoration: none;
      opacity: .7;
      transition: opacity .15s;
      line-height: 1;
    }

    .sc-link:hover {
      opacity: 1;
      color: var(--accent);
    }

    /* ── DIAGNOSTIC HUB ─────────────────────── */
    .debug-log {
      background: #000;
      color: #0f0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 10px;
      height: 200px;
      overflow-y: auto;
      border: 1px solid #333;
      margin: 10px 0;
      white-space: pre-wrap;
      border-radius: 2px;
    }

    .debug-line {
      border-bottom: 1px solid #111;
      padding: 2px 0;
    }

    .debug-line.error {
      color: #f44;
    }

    .debug-line.warn {
      color: #ff0;
    }

    .btn-settings {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: all 0.2s;
    }

    .btn-settings:hover {
      color: var(--accent);
      transform: rotate(45deg);
    }
  </style>
</head>

<body>

  <script>
    // ══ PRO-DEBUGGER INTERCEPTOR ══════════════
    (function () {
      const output = [];
      const originalLog = console.log, originalErr = console.error;
      function logToVirtual(msg, type) {
        const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        output.push(`[${time}] ${type.toUpperCase()}: ${msg}`);
        const el = document.getElementById('debugOutput');
        if (el) {
          const line = document.createElement('div');
          line.className = `debug-line ${type}`;
          line.textContent = `[${time}] ${msg}`;
          el.appendChild(line);
          el.scrollTop = el.scrollHeight;
        }
      }
      console.log = function (...args) { originalLog(...args); logToVirtual(args.join(' '), 'log'); };
      console.error = function (...args) { originalErr(...args); logToVirtual(args.join(' '), 'error'); };
      console.warn = function (...args) { logToVirtual(args.join(' '), 'warn'); };
      window.copyLogs = () => {
        navigator.clipboard.writeText(output.join('\n'));
        alert('LOGS COPIED TO CLIPBOARD');
      };
      window.auditFavs = async () => {
        console.log('--- STARTING ACTIVE RESCUE AUDIT ---');
        const favs = JSON.parse(localStorage.getItem('sparky_favorites') || '[]');
        if (!favs.length) { console.warn('Vault is empty.'); return; }
        console.log(`Total Records: ${favs.length}`);
        for (const [i, f] of favs.entries()) {
          const id = f.stationuuid || f.id;
          if (!id) {
            console.log(`[!] Station ${f.name} is an ORPHAN. Attempting Active Rescue...`);
            await rescueOrphan(f);
          } else {
            console.log(`[${(i + 1).toString().padStart(2, '0')}] ${f.name.slice(0, 10)}.. | ID: ${id.slice(0, 8)} | LINKED`);
          }
        }
        console.log('--- AUDIT COMPLETE ---');
      };

      async function rescueOrphan(st) {
        const mirrors = ['de1.api.radio-browser.info', 'at1.api.radio-browser.info', 'nl1.api.radio-browser.info'];
        const q = st.name.split('-')[0].trim(); // Use base name
        for (const m of mirrors) {
          try {
            const res = await fetch(`https://${m}/json/stations/byname/${encodeURIComponent(q)}`);
            if (!res.ok) continue;
            const results = await res.json();
            const match = results.find(r => norm(r.url_resolved || r.url) === norm(st.url));
            if (match) {
              console.log(`[RESCUE] SUCCESS! Found ID ${match.stationuuid} for ${st.name}`);
              syncFavMetadata(match);
              return true;
            }
          } catch (e) { }
        }
        console.warn(`[RESCUE] FAILED: Could not find clean signature match for ${st.name}`);
        return false;
      }
    })();

    // ══ STORAGE MIGRATION ══════════════════════

      Object.entries(map).forEach(([oldK, newK]) => {
        const data = localStorage.getItem(oldK);
        if (data !== null) {
          if (localStorage.getItem(newK) === null) localStorage.setItem(newK, data);
          localStorage.removeItem(oldK);
        }
      });
    })();

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // ══ STATE ══════════════════════════════════

    // ══ FAVORITES (localStorage) ═══════════════
    const FAV_KEY = 'sparky_favorites';

    function loadFavs() {
      try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch { return []; }
    }
    function saveFavs(f) { localStorage.setItem(FAV_KEY, JSON.stringify(f)); }

    // Normalize URLs for collision-resistant identity checks (protocol/trailing-slash agnostic)
    function norm(u) {
      if (!u) return '';
      try {
        // Structural Fix: Strip dynamic session IDs, timestamps, and query params that break matching
        let n = u.split('?')[0].split('#')[0].toLowerCase().trim();
        n = n.replace(/^https?:\/\//, '').replace(/\/$/, '');
        return n;
      } catch (e) {
        return u.toLowerCase().trim();
      }
    }

    function isFav(st) {
      const u = st.url_resolved || st.url;
      const uuid = st.stationuuid || st.id;
      const fv = loadFavs();
      return fv.some(f => (uuid && (f.id === uuid || f.stationuuid === uuid)) || norm(f.url) === norm(u));
    }
    function addFav(st) {
      const favs = loadFavs(), u = st.url_resolved || st.url;
      const uuid = st.stationuuid || st.id || '';
      if (!favs.some(f => (uuid && (f.id === uuid || f.stationuuid === uuid)) || norm(f.url) === norm(u))) {
        favs.push({
          id: uuid,
          name: st.name,
          url: u,
          bitrate: st.bitrate,
          codec: st.codec,
          countrycode: st.countrycode,
          tags: st.tags || '',
          votes: st.votes
        });
        saveFavs(favs);
      }
      refreshFavBadge();
    }
    function removeFavByUrl(u) {
      saveFavs(loadFavs().filter(f => norm(f.url) !== norm(u)));
      refreshFavBadge();
    }
    function refreshFavBadge() {
      const n = loadFavs().length;
      document.getElementById('favsBadge').textContent = n;
      document.getElementById('footerFavs').textContent = n;
    }

    /**
     * Structural Fix: Auto-Sync favorite metadata (Votes, Tags) from latest API hits 
     */
    function syncFavMetadata(st) {
      if (!st) return;
      const favs = loadFavs();
      const u = st.url_resolved || st.url;
      const uuid = st.stationuuid || st.id;
      const favIdx = favs.findIndex(f => {
        const idMatch = uuid && (f.id === uuid || f.stationuuid === uuid);
        const urlMatch = norm(f.url) === norm(u);
        if (urlMatch && !idMatch) console.log(`[SYNC-HINT] Repairing signature for ${f.name}...`);
        return idMatch || urlMatch;
      });

      if (favIdx !== -1) {
        let changed = false;
        // Update legacy favorites missing votes or with old counts
        if (st.votes !== undefined && favs[favIdx].votes !== st.votes) {
          favs[favIdx].votes = st.votes;
          changed = true;
        }
        // Update tags/icon if they've changed in the DB
        if (st.tags !== undefined && favs[favIdx].tags !== st.tags) {
          favs[favIdx].tags = st.tags;
          changed = true;
        }
        if (st.favicon !== undefined && favs[favIdx].favicon !== st.favicon) {
          favs[favIdx].favicon = st.favicon;
          changed = true;
        }
        if ((st.clickcount || st.c) !== undefined && favs[favIdx].clickcount !== (st.clickcount || st.c)) {
          favs[favIdx].clickcount = st.clickcount || st.c;
          changed = true;
        }
        if ((st.clicktrend || st.ct) !== undefined && favs[favIdx].clicktrend !== (st.clicktrend || st.ct)) {
          favs[favIdx].clicktrend = st.clicktrend || st.ct;
          changed = true;
        }
        // URL-Rescue Grafting: If favorite is missing an ID, graft it from the live signature
        if (uuid && !favs[favIdx].id && !favs[favIdx].stationuuid) {
          console.log(`[RESCUE] Grafting ID ${uuid} into legacy record: ${st.name}`);
          favs[favIdx].id = uuid;
          changed = true;
        }

        if (changed) {
          console.log(`[SYNC] Refreshing telemetry for: ${st.name}`);
          saveFavs(favs);
        }
      }
    }

    async function backgroundSyncFavs() {
      const fv = loadFavs();
      if (!fv.length) return;
      const mirrors = ["de1.api.radio-browser.info", "at1.api.radio-browser.info", "nl1.api.radio-browser.info", "all.api.radio-browser.info"];

      for (let f of fv) {
        await sleep(500); // Polite Heartbeat Sync: Prevents Vercel rate-limiting and browser congestion
        let id = f.id || f.stationuuid;
        const m = mirrors[Math.floor(Math.random() * mirrors.length)];
        try {
          if (!id) {
            // Master URL Rescue: Fingerprint search even if name/label was changed
            const cleanUrl = f.url.split('?')[0];
            const sr = await fetch(`https://${m}/json/stations/byurl?url=${encodeURIComponent(cleanUrl)}`);
            const res = await sr.json();
            const match = res && res.length ? res[0] : null;
            if (match) {
              id = match.stationuuid;
              let latest = loadFavs();
              let idx = latest.findIndex(fav => norm(fav.url) === norm(f.url));
              if (idx !== -1) {
                latest[idx].id = id;
                latest[idx].stationuuid = id;
                saveFavs(latest);
              }
            } else continue;
          }

          const r = await fetch(`https://${m}/json/stations/byuuid/${id}`, { cache: 'no-store' });
          const d = await r.json();
          if (d && d.length) {
            syncFavMetadata(d[0]);
            if (activeTab === 'favs') renderFavs();
          }
        } catch (e) { console.error("[SYNC_ERROR]", e); }
      }
    }

    // ══ EQ ════════════════════════════════════
    const EQ_FREQS = [60, 170, 310, 600, 1000, 3000, 6000, 12000];
    const EQ_LABELS = ['60Hz', '170Hz', '310Hz', '600Hz', '1kHz', '3kHz', '6kHz', '12kHz'];
    const eqNodes = [], eqVals = new Array(8).fill(0);

    const FACTORY_PRESETS = {
      flat: [0, 0, 0, 0, 0, 0, 0, 0],
      bass: [5, 4, 2, 0, -1, -1, 1, 2],
      vocal: [-2, -1, 0, 2, 4, 5, 3, 2],
      jazz: [2, 2, 1, 0, 2, 3, 2, 2],
      pop: [2, 1, 0, 1, 2, 3, 3, 4],
      rock: [4, 3, 1, -1, 0, 2, 3, 3],
      hiphop: [5, 4, 2, 0, 1, 2, 2, 3],
      classic: [0, 0, 0, 1, 2, 3, 2, 2],
      electron: [4, 3, 1, 0, 0, 2, 3, 4],
      custom: [3, 2, 1, 0, 1, 2, 2, 3]
    };
    let currentPresets = JSON.parse(localStorage.getItem('sparky_eq_presets') || JSON.stringify(FACTORY_PRESETS));
    let activePreset = 'flat';

    EQ_LABELS.forEach((label, i) => {
      const col = document.createElement('div'); col.className = 'eq-col';
      col.innerHTML = `
    <div class="eq-slider-box" id="eqS${i}">
      <div class="eq-fader" id="eqF${i}" style="bottom:50%"></div>
    </div>
    <div class="eq-label-freq">${label}</div>
  `;
      document.getElementById('eqRow').appendChild(col);

      const updateFader = (y) => {
        const box = document.getElementById('eqS' + i);
        const rect = box.getBoundingClientRect();
        let p = 1 - (y - rect.top) / rect.height;
        p = Math.max(0, Math.min(1, p));
        let v = (p - 0.5) * 30; // +/- 15dB
        eqVals[i] = v;
        const f = document.getElementById('eqF' + i);
        f.style.bottom = (p * 100) + '%';
        f.setAttribute('data-db', v.toFixed(1) + 'dB');
        if (eqNodes[i]) eqNodes[i].gain.value = v;
      };

      const box = document.getElementById('eqS' + i);
      box.addEventListener('mousedown', e => {
        updateFader(e.clientY);
        const move = (me) => updateFader(me.clientY);
        const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      });
      box.addEventListener('touchstart', e => {
        updateFader(e.touches[0].clientY);
        const move = (te) => { te.preventDefault(); updateFader(te.touches[0].clientY); };
        const up = () => { window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up); };
        window.addEventListener('touchmove', move, { passive: false });
        window.addEventListener('touchend', up);
      });
    });

    function sparkyAlert(msg, header = "SYSTEM MESSAGE") {

    function setEqPreset(p) {
      activePreset = p;
      const vals = currentPresets[p] || FACTORY_PRESETS.flat;
      document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
      if (document.getElementById('pre-' + p)) document.getElementById('pre-' + p).classList.add('active');
      vals.forEach((v, i) => {

        f.style.bottom = pcent + '%';
        f.setAttribute('data-db', v.toFixed(1) + 'dB');
        if (eqNodes[i]) eqNodes[i].gain.value = v;
      });

    function saveCustomEq() {
      const p = activePreset.toUpperCase();
      sparkyConfirm(`Commit current levels to the [${p}] memory bank? This will overwrite existing specs.`, () => {
        currentPresets[activePreset] = [...eqVals];

          setEqPreset(activePreset);
        }, "PRESET RECOVERY");

        sparkyConfirm(`GLOBAL SYSTEM RESET: Revert ALL presets to factory defaults?`, () => {
          currentPresets = JSON.parse(JSON.stringify(FACTORY_PRESETS));

    // ══ AUDIO INIT ════════════════════════════
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser(); analyser.fftSize = 64;
      srcNode = audioCtx.createMediaElementSource(audioEl);
      let chain = srcNode;
      EQ_FREQS.forEach((freq, i) => {
        const f = audioCtx.createBiquadFilter();
        f.type = i === 0 ? 'lowshelf' : i === 7 ? 'highshelf' : 'peaking';
        f.frequency.value = freq; f.gain.value = eqVals[i];
        eqNodes.push(f); chain.connect(f); chain = f;
      });
      chain.connect(analyser); analyser.connect(audioCtx.destination);
    }

    // ══ VISUALIZER ════════════════════════════
    const vizBars = document.querySelectorAll('.visualizer .bar');
    const vizData = new Uint8Array(28);

    function drawViz() {
      rafId = requestAnimationFrame(drawViz);
      if (!analyser) return;
      analyser.getByteFrequencyData(vizData);
      vizBars.forEach((b, i) => { b.style.height = (4 + (vizData[i] || 0) / 255 * 26) + 'px'; });
    }
    function idleViz() {
      cancelAnimationFrame(rafId); let t = 0;
      (function tick() {
        rafId = requestAnimationFrame(tick); t += .05;
        vizBars.forEach((b, i) => { b.style.height = (4 + Math.abs(Math.sin(t + i * .4)) * 10) + 'px'; });
      })();
    }
    idleViz();

    // ══ STATUS ════════════════════════════════
    function setStatus(state, txt) {
      document.getElementById('statusDot').className = 'dot ' + ({ playing: 'active', buffering: 'buffering', error: 'error' }[state] || '');
      document.getElementById('statusText').textContent = txt.toUpperCase();

    // ══ NOW PLAYING ═══════════════════════════
    function updateNowPlaying(st) {
      const nm = document.getElementById('npName');
      nm.textContent = st ? st.name : '— SELECT A STATION —';
      nm.className = 'np-name' + (st ? ' running' : '');

      // Dynamic Velocity Calibration: 50px per second
      if (st) {
        const textWidth = nm.scrollWidth;
        const containerWidth = nm.parentElement.offsetWidth;
        // Calculation: Duration = (TextWidth + ContainerWidth) / Speed
        const duration = (textWidth + containerWidth) / 50; 
        nm.style.animationDuration = duration + 's';
      }

      // Metadata row
      document.getElementById('npVotes').textContent = fmtK(st?.votes || st?.v || 0);
      document.getElementById('npClicks').textContent = fmtK(st?.clickcount || st?.c || 0);
      document.getElementById('npTrend').textContent = (st?.clicktrend !== undefined || st?.ct !== undefined) ? ((st.clicktrend || st.ct) > 0 ? '+' + (st.clicktrend || st.ct) : (st.clicktrend || st.ct)) : '—';
      document.getElementById('npCountry').textContent = st?.countrycode || '—';
      document.getElementById('npCodec').textContent = st?.codec || '—';

      updateStationCard(st);

    // ══ STATION CARD ══════════════════════════
    function updateStationCard(st) {
      const card = document.getElementById('stationCard');
      if (!card) return;
      if (!st) {
        card.innerHTML = '<div class="sc-idle"><div class="sc-idle-icon">📡</div><div>SELECT A STATION</div></div>';
        return;
      }
      const initials = (st.name || '?').replace(/[^A-Za-z0-9]/g, '').slice(0, 2).toUpperCase() || '??';
      const faviconHtml = st.favicon
        ? `<img src="${esc(st.favicon)}" class="sc-favicon" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="sc-initials" style="display:none">${initials}</div>`
        : `<div class="sc-initials">${initials}</div>`;
      const votes = st.votes ? `<span class="sc-meta-badge">▲ ${Number(st.votes).toLocaleString()}</span>` : '';
      const lang = st.language ? `<span class="sc-meta-badge">${esc(st.language)}</span>` : '';
      const link = st.homepage ? `<a href="${esc(st.homepage)}" target="_blank" class="sc-link" title="Station website">🔗</a>` : '';
      const tags = (st.tags || '').split(',').slice(0, 4).filter(t => t.trim()).map(t => `<span class="sc-tag">${esc(t.trim())}</span>`).join('');
      card.innerHTML = `<div class="sc-art">${faviconHtml}</div><div class="sc-info"><div class="sc-meta-row">${votes}${lang}${link}</div><div class="sc-tags">${tags}</div></div>`;

    // ══ PLAYBACK ══════════════════════════════
    function playStationObj(st) {
      if (!st) return;
      syncFavMetadata(st); // Sync stats on play
      currentSrc = st;
      if (audioCtx?.state === 'suspended') audioCtx.resume();
      initAudio();

      if (hls) { hls.destroy(); hls = null; }
      audioEl.pause();

      const url = st.url_resolved || st.url;
      audioEl.volume = document.getElementById('volSlider').value / 100;
      setStatus('buffering', 'BUFFERING');
      updateNowPlaying(st);
      updateMediaSession(st);

      if (url.toLowerCase().includes('.m3u8') && Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(audioEl);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          audioEl.play().then(onPlaySuccess).catch(onPlayError);
        });
        hls.on(Hls.Events.ERROR, (event, data) => { if (data.fatal) onPlayError(); });
      } else {
        audioEl.src = url;
        audioEl.play().then(onPlaySuccess).catch(onPlayError);
      }

      function onPlaySuccess() {
        isPlaying = true; setStatus('playing', 'CONNECTED');
        document.getElementById('btnPlay').innerHTML = '&#9646;&#9646; PAUSE';
        cancelAnimationFrame(rafId); drawViz();
      }
      function onPlayError() {
        setStatus('error', 'ERROR');
        document.getElementById('btnPlay').innerHTML = '&#9654; PLAY';
      }
    }

    function playAtIndex(idx) {
      const list = activeTab === 'favs' ? loadFavs() : stations;
      if (idx < 0 || idx >= list.length) return;
      currentIdx = idx; playStationObj(list[idx]);
      renderCurrent();
    }

    function stopPlayback() {
      audioEl.pause(); audioEl.src = '';
      isPlaying = false; currentSrc = null;
      setStatus('', 'IDLE');
      document.getElementById('btnPlay').innerHTML = '&#9654; PLAY';
      idleViz(); renderCurrent();
      updateStationCard(null);
    }

    function renderCurrent() { activeTab === 'stations' ? renderStations() : renderFavs(); }

    // ══ RENDER STATIONS ═══════════════════════
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function fmtK(n) {
      const v = Number(n || 0);
      if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
      if (v >= 1000) return (v / 1000).toFixed(1) + 'K';
      return v;
    }

    function renderStations() {
      const pl = document.getElementById('playlist');
      document.getElementById('plCount').textContent = stations.length + ' FOUND';
      document.getElementById('stationsBadge').textContent = stations.length;
      document.getElementById('footerCount').textContent = stations.length;
      if (!stations.length) {
        pl.innerHTML = '<div class="pl-empty"><div class="pl-empty-icon">📡</div><div>SEARCH TO DISCOVER STATIONS</div></div>'; return;
      }

      // Elite Power Ranking Engine
      if (stations.length > 1) {
        if (sortMode === 'power') {
          const maxC = Math.max(...stations.map(s => s.clickcount || 0), 1);
          const maxV = Math.max(...stations.map(s => s.votes || 0), 1);
          const maxT = Math.max(...stations.map(s => s.clicktrend || 0), 1);
          stations.sort((a, b) => {
            const sA = ((a.clickcount || 0) / maxC * 0.6) + ((a.votes || 0) / maxV * 0.3) + ((a.clicktrend || 0) / maxT * 0.1);
            const sB = ((b.clickcount || 0) / maxC * 0.6) + ((b.votes || 0) / maxV * 0.3) + ((b.clicktrend || 0) / maxT * 0.1);
            return sB - sA;
          });
        } else {
          stations.sort((a, b) => (b.votes || 0) - (a.votes || 0));
        }
      }

      pl.innerHTML = stations.map((st, i) => {
        syncFavMetadata(st); // Live sync metadata during discovery scroll
        const url = st.url_resolved || st.url;
        const actv = currentSrc && (
          (currentSrc.stationuuid && currentSrc.stationuuid === st.stationuuid) ||
          (currentSrc.url_resolved || currentSrc.url) === url
        ) && activeTab === 'stations';
        const favd = isFav(st);
        return `<div class="pl-item${actv ? ' active' : ''}" data-idx="${i}">
      <div class="pl-sidebar">
        <div class="pl-num">${actv ? '▶' : (i + 1).toString().padStart(2, '0')}</div>
      </div>
      <div class="pl-main">
        <div class="pl-item-name">
          ${esc(st.name)}
          ${st.clickcount > 1500 ? '<span class="pl-status-badge hot">HOT</span>' : ''}
          ${st.clicktrend > 50 ? '<span class="pl-status-badge trending">TRENDING</span>' : ''}
        </div>
        <div class="pl-item-sub-row">
          <div class="pl-item-sub">${esc(st.countrycode || '--')} · ${esc((st.tags || '').split(',')[0] || 'radio')}</div>
          <div class="pl-badge-group">

    // ══ RENDER FAVORITES ══════════════════════
    function renderFavs() {
      const pl = document.getElementById('playlist'), favs = loadFavs();
      refreshFavBadge();
      document.getElementById('plCount').textContent = favs.length + ' SAVED';
      if (!favs.length) {
        pl.innerHTML = '<div class="pl-empty"><div class="pl-empty-icon">★</div><div>NO FAVORITES YET</div><div class="pl-empty-hint">HOVER A STATION AND CLICK + FAV</div></div>'; return;
      }
      // Apply Tri-Mode Sorting to the Vault
      if (favs.length > 1 && sortMode !== 'custom') {
        if (sortMode === 'power') {
          const maxC = Math.max(...favs.map(s => s.clickcount || s.c || 0), 1);
          const maxV = Math.max(...favs.map(s => s.votes || s.v || 0), 1);
          const maxT = Math.max(...favs.map(s => s.clicktrend || s.ct || 0), 1);
          favs.sort((a, b) => {
            const sA = ((a.clickcount || a.c || 0) / maxC * 0.6) + ((a.votes || a.v || 0) / maxV * 0.3) + ((a.clicktrend || a.ct || 0) / maxT * 0.1);
            const sB = ((b.clickcount || b.c || 0) / maxC * 0.6) + ((b.votes || b.v || 0) / maxV * 0.3) + ((b.clicktrend || b.ct || 0) / maxT * 0.1);
            return sB - sA;
          });
        } else {
          favs.sort((a, b) => (b.votes || b.v || 0) - (a.votes || a.v || 0));
        }
      }

      pl.innerHTML = favs.map((st, i) => {
        const actv = currentSrc && (
          (currentSrc.stationuuid && (currentSrc.stationuuid === st.id || currentSrc.stationuuid === st.stationuuid)) ||
          (currentSrc.id && (currentSrc.id === st.id || currentSrc.id === st.stationuuid)) ||
          norm(currentSrc.url_resolved || currentSrc.url) === norm(st.url)
        ) && activeTab === 'favs';

        const isManual = sortMode === 'custom';
        return `<div class="pl-item${actv ? ' active' : ''}" data-idx="${i}">
      <div class="pl-sidebar">
        ${isManual ? `<button class="btn-stack" data-upfav="${i}" title="Move up"><span class="material-symbols-outlined">expand_less</span></button>` : ''}
        <div class="pl-num">${actv ? '▶' : (i + 1).toString().padStart(2, '0')}</div>
        ${isManual ? `<button class="btn-stack" data-downfav="${i}" title="Move down"><span class="material-symbols-outlined">expand_more</span></button>` : ''}
      </div>
      <div class="pl-main">
        <div class="pl-item-name">${esc(st.name)}</div>
        <div class="pl-item-sub-row">
          <div class="pl-item-sub">${esc(st.countrycode || '--')} · ${esc((st.tags || '').split(',')[0] || 'radio')}</div>
          <div class="pl-badge-group">
            <div class="pl-badge-mini"><i>🔥</i> ${fmtK(st.clickcount || st.c)}</div>
            <div class="pl-badge-mini"><i>👍</i> ${fmtK(st.votes || st.v)}</div>
            <div class="pl-badge-mini"><i>📈</i> ${fmtK(st.clicktrend || st.ct)}</div>
          </div>
        </div>
      </div>
      <div class="pl-end">
        <button class="pl-edit" data-editfav="${i}" title="Edit">✎</button>
        <button class="pl-remove" data-rmfav="${i}">✕</button>
      </div>
    </div>`;
      }).join('');

      pl.querySelectorAll('.pl-item').forEach(el => {
        el.addEventListener('click', e => {
          if (e.target.classList.contains('pl-remove') || e.target.classList.contains('pl-edit')) return;
          currentIdx = parseInt(el.dataset.idx); activeTab = 'favs'; playStationObj(favs[currentIdx]); renderFavs();
        });
      });
      pl.querySelectorAll('[data-rmfav]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const f = favs[parseInt(btn.dataset.rmfav)];
          sparkyConfirm(`Remove [${f.name}] from your favorites?`, () => {
            if (currentSrc && (currentSrc.url_resolved || currentSrc.url) === f.url) stopPlayback();
            removeFavByUrl(f.url); renderFavs();
          }, "CONFIRM DELETION");
        });
      });
      pl.querySelectorAll('[data-upfav]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const idx = parseInt(btn.dataset.upfav);
          let favs = loadFavs();
          if (idx > 0) {
            [favs[idx - 1], favs[idx]] = [favs[idx], favs[idx - 1]];
            saveFavs(favs);
            renderFavs();
          }
        });
      });
      pl.querySelectorAll('[data-downfav]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const idx = parseInt(btn.dataset.downfav);
          let favs = loadFavs();
          if (idx < favs.length - 1) {
            [favs[idx + 1], favs[idx]] = [favs[idx], favs[idx + 1]];
            saveFavs(favs);
            renderFavs();
          }
        });
      });
      pl.querySelectorAll('[data-editfav]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const idx = parseInt(btn.dataset.editfav);
          const st = favs[idx]; // the station object in the current sorted view
          if (st) {
            openEditModal(st.name, st.url, (newName, newUrl) => {
              if (newName !== null && newUrl !== null) {
                // Find in master list to persist edit properly
                let master = loadFavs();
                let masterIdx = master.findIndex(f => f.url === st.url);
                if (masterIdx !== -1) {
                  master[masterIdx].name = newName;
                  master[masterIdx].url = newUrl;
                  saveFavs(master);
                  renderFavs();
                }
              }
            });
          }
        });
      });
    } // <-- This closing brace was missing, causing the script to break

  <script>
    function openEditModal(name, url, onSave) {
      const overlay = document.getElementById('editModalOverlay');
      const nameInput = document.getElementById('editStationName');
      const urlInput = document.getElementById('editStationUrl');
      const saveBtn = document.getElementById('editModalSave');
      const cancelBtn = document.getElementById('editModalCancel');
      nameInput.value = name || '';
      urlInput.value = url || '';
      overlay.style.display = 'flex';
      nameInput.focus();
      function closeModal() {
        overlay.style.display = 'none';
        saveBtn.onclick = null;
        cancelBtn.onclick = null;
        overlay.onclick = null;
        document.onkeydown = null;
      }
      saveBtn.onclick = function (e) {
        e.preventDefault();
        closeModal();
        onSave(nameInput.value.trim(), urlInput.value.trim());
      };
      cancelBtn.onclick = function (e) {
        e.preventDefault();
        closeModal();
        onSave(null, null);
      };
      overlay.onclick = function (e) {
        if (e.target === overlay) { closeModal(); onSave(null, null); }
      };
      document.onkeydown = function (e) {
        if (e.key === 'Escape') { closeModal(); onSave(null, null); }
        if (e.key === 'Enter' && document.activeElement !== cancelBtn) { saveBtn.click(); }
      };
    }
  </script>
  <script>
    // ══ TRANSPORT ═════════════════════════════
    document.getElementById('btnPlay').addEventListener('click', () => {
      if (audioCtx?.state === 'suspended') audioCtx.resume();
      if (!isPlaying) {
        if (currentSrc) {
          audioEl.play().then(() => {
            isPlaying = true; setStatus('playing', 'CONNECTED');
            document.getElementById('btnPlay').innerHTML = '&#9646;&#9646; PAUSE';
            cancelAnimationFrame(rafId); drawViz();
          });
        } else {
          const list = activeTab === 'favs' ? loadFavs() : stations;
          if (list.length) { currentIdx = 0; playStationObj(list[0]); renderCurrent(); }
        }
      } else {
        audioEl.pause(); isPlaying = false; setStatus('', 'PAUSED');
        document.getElementById('btnPlay').innerHTML = '&#9654; PLAY';
        idleViz();
      }
    });

    document.getElementById('btnStop').addEventListener('click', stopPlayback);

    document.getElementById('btnNext').addEventListener('click', () => {
      const list = activeTab === 'favs' ? loadFavs() : stations; if (!list.length) return;
      playAtIndex(shuffle ? Math.floor(Math.random() * list.length) : (currentIdx + 1) % list.length);
    });
    document.getElementById('btnPrev').addEventListener('click', () => {
      const list = activeTab === 'favs' ? loadFavs() : stations; if (!list.length) return;
      playAtIndex(shuffle ? Math.floor(Math.random() * list.length) : (currentIdx - 1 + list.length) % list.length);
    });

    document.getElementById('btnShuffle').addEventListener('click', function () { shuffle = !shuffle; this.classList.toggle('active', shuffle); });
    document.getElementById('btnRepeat').addEventListener('click', function () { repeat = !repeat; this.classList.toggle('active', repeat); audioEl.loop = repeat; });
    document.getElementById('btnEq').addEventListener('click', function () {
      const r = document.getElementById('eqRack'); r.classList.toggle('open'); this.classList.toggle('active', r.classList.contains('open'));
    });
    function updateSortUI() {
      const btn = document.getElementById('btnSortMode');
      const tip = document.getElementById('plSortTooltip');
      if (!btn || !tip) return;

      const icon = sortMode === 'power' ? 'bolt' : (sortMode === 'vote' ? 'how_to_vote' : 'star');
      btn.innerHTML = `<span class="material-symbols-outlined">${icon}</span>`;

      const modes = activeTab === 'stations' ? ['power', 'vote'] : ['power', 'vote', 'custom'];
      const labels = { power: 'Power Ranking', vote: 'Vote Ranking', custom: 'Custom Order' };
      const icons = { power: 'bolt', vote: 'how_to_vote', custom: 'star' };

      tip.innerHTML = modes.map(m => `
    <div class="pl-sort-row${sortMode === m ? ' active' : ''}">
      <span class="material-symbols-outlined">${icons[m]}</span>
      <span class="sort-desc">${labels[m]}</span>
    </div>
  `).join('');
    }

    document.getElementById('btnSortMode').addEventListener('mouseenter', () => document.getElementById('plSortTooltip').classList.add('show'));
    document.getElementById('btnSortMode').addEventListener('mouseleave', () => document.getElementById('plSortTooltip').classList.remove('show'));

    document.getElementById('volSlider').addEventListener('input', function () {
      const v = this.value;
      audioEl.volume = v / 100;
      localStorage.setItem('sparky_volume', v);
    });

    document.getElementById('btnSortMode').addEventListener('click', function () {
      const modes = activeTab === 'stations' ? ['power', 'vote'] : ['power', 'vote', 'custom'];
      let idx = (modes.indexOf(sortMode) + 1) % modes.length;
      if (idx < 0) idx = 0;
      sortMode = modes[idx];

      if (activeTab === 'favs') {
        favSortMode = sortMode;
        localStorage.setItem('sparky_fav_sort_mode', favSortMode);
      }

      updateSortUI();
      renderCurrent();

      // Mobile/Auto-Hide Logic: Keep visible then dismiss after 1.5s
      const tip = document.getElementById('plSortTooltip');
      if (tip) {
        tip.classList.add('show');
        clearTimeout(sortTooltipTimeout);
        sortTooltipTimeout = setTimeout(() => {
          tip.classList.remove('show');
        }, 1500);
      }
    });

    audioEl.addEventListener('ended', () => {
      if (!repeat) { const list = activeTab === 'favs' ? loadFavs() : stations; if (list.length) playAtIndex(shuffle ? Math.floor(Math.random() * list.length) : (currentIdx + 1) % list.length); else stopPlayback(); }
    });
    audioEl.addEventListener('error', () => { setStatus('error', 'STREAM ERROR'); isPlaying = false; document.getElementById('btnPlay').innerHTML = '&#9654; PLAY'; idleViz(); });
    audioEl.addEventListener('waiting', () => setStatus('buffering', 'BUFFERING'));
    audioEl.addEventListener('playing', () => setStatus('playing', 'CONNECTED'));

    // ══ SEARCH ════════════════════════════════
    async function searchStations(q) {
      const playlist = document.getElementById('playlist');
      const countLabel = document.getElementById('plCount');
      playlist.innerHTML = '<div class="pl-loading"><div class="spinner"></div>SCANNING MIRRORS...</div>';
      countLabel.textContent = 'SCANNING...';

      const mirrors = ['de1.api.radio-browser.info', 'at1.api.radio-browser.info', 'nl1.api.radio-browser.info'];
      // Randomize start mirror
      for (let i = mirrors.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [mirrors[i], mirrors[j]] = [mirrors[j], mirrors[i]];
      }

      let success = false;
      for (const srv of mirrors) {
        try {
          console.log(`[NET] Mirror Attempt: ${srv}`);
          const response = await fetch(`https://${srv}/json/stations/search?` + new URLSearchParams({
            name: q,
            limit: 150,
            hidebroken: true,
            ssl_error: false,
            order: 'clickcount',
            reverse: true
          }), {
            headers: { 'User-Agent': 'SparkyRadio/2.2 (Web; EliteCuration)' }
          });

          console.log(`[NET] Status: ${response.status} (${srv})`);
          if (!response.ok) throw new Error('Status ' + response.status);

          const raw = await response.json();
          const valid = raw.filter(s => s.url_resolved || s.url);

          // Elite Heuristic Curation: Normalized Multi-Metric Sorting (Resolves Scaling Bias)
          const maxClicks = Math.max(...valid.map(s => Number(s.clickcount || 0)), 1);
          const maxVotes = Math.max(...valid.map(s => Number(s.votes || 0)), 1);
          const maxTrend = Math.max(...valid.map(s => Math.abs(Number(s.clicktrend || 0))), 1);

          const getNormalizedScore = s => {
            const pScore = (Number(s.clickcount || 0) / maxClicks) * 0.6;
            const vScore = (Number(s.votes || 0) / maxVotes) * 0.3;
            const tScore = (Number(s.clicktrend || 0) / maxTrend) * 0.1;
            return pScore + vScore + tScore;
          };

          stations = valid.sort((a, b) => getNormalizedScore(b) - getNormalizedScore(a));
          success = true;
          break;
        } catch (err) {
          console.warn(`Mirror ${srv} unreachable, attempting fallback...`);
        }
      }

      if (success) {
        renderStations();
      } else {
        playlist.innerHTML = '<div class="pl-empty"><div class="pl-empty-icon">⚠</div><div>ALL MIRRORS UNREACHABLE</div><div class="pl-empty-hint">Check your connection or try again later</div></div>';
        countLabel.textContent = 'ERROR';
      }
    }

    document.getElementById('btnSearch').addEventListener('click', () => {
      const q = document.getElementById('searchInput').value.trim();
      if (q) { switchTab('stations'); searchStations(q); }
    });
    document.getElementById('searchInput').addEventListener('input', e => {
      document.getElementById('btnSearchClear').style.display = e.target.value ? 'flex' : 'none';
    });
    document.getElementById('btnSearchClear').addEventListener('click', () => {
      const inp = document.getElementById('searchInput');
      inp.value = '';
      inp.focus();
      document.getElementById('btnSearchClear').style.display = 'none';
    });

    document.getElementById('statusText').parentElement.addEventListener('click', () => {
      document.getElementById('debugModal').style.display = 'flex';
    });
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) { switchTab('stations'); searchStations(q); } }
    });

    document.getElementById('btnAdd').addEventListener('click', () => {
      const url = prompt('Enter stream URL:'); if (!url) return;
      const name = prompt('Station name:', 'Custom Station');
      stations.push({ name: name || 'Custom Station', url_resolved: url, url, bitrate: '', codec: '', countrycode: '', tags: '' });
      switchTab('stations');
    });
    document.getElementById('btnRemove').addEventListener('click', () => {
      if (currentIdx < 0) return;
      if (activeTab === 'favs') { const f = loadFavs()[currentIdx]; removeFavByUrl(f.url); stopPlayback(); renderFavs(); }
      else { stations.splice(currentIdx, 1); stopPlayback(); renderStations(); }
    });

    // ══ MEDIA SESSION (Lock Screen) ══════════
    function updateMediaSession(st) {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: st.name,
        artist: st.countrycode ? `Country: ${st.countrycode}` : 'International',
        album: 'SPARKY RADIO',
        artwork: [
          { src: st.favicon || 'icon-192.png', sizes: '192x192', type: 'image/png' },
          { src: st.favicon || 'icon-512.png', sizes: '512x512', type: 'image/png' }
        ]
      });
    }
    if ('mediaSession' in navigator) {
      navigator.mediaSession.setActionHandler('play', () => document.getElementById('btnPlay').click());
      navigator.mediaSession.setActionHandler('pause', () => document.getElementById('btnPlay').click());
      navigator.mediaSession.setActionHandler('previoustrack', () => document.getElementById('btnPrev').click());
      navigator.mediaSession.setActionHandler('nexttrack', () => document.getElementById('btnNext').click());
      navigator.mediaSession.setActionHandler('stop', stopPlayback);
    }

    // ══ INIT ══════════════════════════════════
    const savedVol = localStorage.getItem('sparky_volume');
    if (savedVol !== null) {
      document.getElementById('volSlider').value = savedVol;
      audioEl.volume = savedVol / 100;
    }
    setEqPreset(activePreset);
    refreshFavBadge();
    searchStations('jazz');
  </script>
