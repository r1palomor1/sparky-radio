<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPARKY · Internet Radio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="material-symbols.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #181614;
    --panel:     #222020;
    --panel2:    #282624;
    --border:    #343030;
    --accent:    #5cb870;
    --accent2:   #e86030;
    --green:     #80d090;
    --fav:       #e8c840;
    --text:      #ccc8c0;
    --dim:       #60584e;
    --subdim:    #2e2a26;
    --viz-bg:    #131210;
    --np-bg:     #1e1c1a;
    --ctrl-bg:   #1a1816;
    --pl-bg:     #1c1a18;
    --pl-hover:  #262220;
    --pl-active: #1e2a1e;
    --pl-footer: #1a1816;
    --seek-bg:   #302c28;
    --tab-bg:    #1a1816;
    --tab-active:#1e1c1a;
    --grid-line: #201e1c;
    --glow:      0 0 8px #5cb87088, 0 0 20px #5cb87033;
    --glow2:     0 0 8px #80d09088, 0 0 20px #80d09033;
    --glowfav:   0 0 8px #e8c84088, 0 0 20px #e8c84033;
    --app-border: #5e5248;
    --app-shadow: 0 8px 40px #00000080;
  }

  body.light {
    --bg:        #5a5848;
    --panel:     #b8b4a0;
    --panel2:    #b2ae9c;
    --border:    #8e8a78;
    --accent:    #2a7a3a;
    --accent2:   #c83820;
    --green:     #186828;
    --fav:       #906800;
    --text:      #0c0800;
    --dim:       #30240e;
    --subdim:    #9a9684;
    --viz-bg:    #9e9a88;
    --np-bg:     #bcb8a6;
    --ctrl-bg:   #b0ac9a;
    --pl-bg:     #b6b2a0;
    --pl-hover:  #c0bca8;
    --pl-active: #a8b8a0;
    --pl-footer: #b0ac9a;
    --seek-bg:   #8a8674;
    --tab-bg:    #aca896;
    --tab-active:#b8b4a2;
    --grid-line: #524e40;
    --glow:      0 0 6px #2a7a3a66;
    --glow2:     0 0 6px #18682866;
    --glowfav:   0 0 6px #90680066;
    --app-border: #707060;
    --app-shadow: 0 4px 24px #00000040;
  }

  body {
    background: var(--bg);
    background-image:
      repeating-linear-gradient(0deg, transparent 0px, transparent 39px, var(--grid-line) 39px, var(--grid-line) 40px),
      repeating-linear-gradient(90deg, transparent 0px, transparent 39px, var(--grid-line) 39px, var(--grid-line) 40px);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    padding: 20px;
    transition: background-color 0.3s, color 0.3s;
  }

  .app {
    width: 100%; max-width: 400px;
    background: var(--panel);
    border: 2px solid var(--app-border);
    box-shadow: var(--app-shadow);
    border-radius: 3px;
    position: relative; overflow: hidden;
    transition: background 0.3s, border-color 0.3s;
  }

  /* ── RESPONSIVE ─────────────────────────── */
  /* Tablet: fill height, wider card */
  @media (min-width: 600px) and (max-width: 1023px) {
    body { padding: 12px; align-items: flex-start; }
    .app {
      max-width: min(94vw, 580px);
      min-height: calc(100dvh - 24px);
      display: flex; flex-direction: column;
    }
    .playlist { flex: 1; height: auto; min-height: 170px; max-height: 320px; }
  }
  /* Mobile: full-height, internal playlist scroll */
  @media (max-width: 599px) {
    body { align-items: stretch; padding: 0; overflow: hidden; }
    .app {
      max-width: 100%; height: 100dvh;
      border-left: none; border-right: none; border-radius: 0;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .playlist { flex: 1; min-height: 0; height: 0; overflow-y: auto; }
    .logo-title { font-size: 13px; letter-spacing: 2px; white-space: nowrap; }
  }

  /* ── HEADER ─────────────────────────────── */
  .header {
    background: var(--ctrl-bg);
    padding: 11px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo-title {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: 17px; letter-spacing: 4px;
    color: var(--text); line-height: 1;
    text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  /* THEME TOGGLE */
  .theme-toggle {
    display: flex; align-items: center; gap: 5px;
    cursor: pointer; user-select: none;
  }
  .toggle-track {
    width: 32px; height: 18px;
    background: var(--subdim); border-radius: 9px;
    position: relative; transition: background 0.3s;
    border: 1px solid var(--border);
  }
  .toggle-track.on { background: var(--accent); }
  .toggle-thumb {
    width: 12px; height: 12px; background: #fff; border-radius: 50%;
    position: absolute; top: 2px; left: 2px;
    transition: left .25s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 1px 3px #00000050;
  }
  .toggle-track.on .toggle-thumb { left: 17px; }
  .toggle-icon { font-size: 11px; line-height: 1; }

  /* STATUS */
  .status-cluster { display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); transition: all .3s; flex-shrink: 0; }
  .dot.active    { background: var(--accent); box-shadow: var(--glow); animation: pulse 1.5s infinite; }
  .dot.buffering { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse .5s infinite; }
  .dot.error     { background: #e03030; box-shadow: 0 0 8px #e0303088; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #statusText { font-size: 10px; letter-spacing: 2px; color: var(--dim); font-weight: 600; }

  /* ── VISUALIZER (compact strip below header) ── */
  .visualizer {
    height: 28px; background: var(--viz-bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: 1px; padding: 4px 10px 0;
    overflow: hidden;
  }
  .bar {
    flex: 1;
    background: linear-gradient(to top, #2a5c34, var(--accent), var(--green));
    border-radius: 1px 1px 0 0; height: 4px;
    transition: height .08s ease; opacity: .9;
  }

  /* ── NOW PLAYING ────────────────────────── */
  .now-playing {
    padding: 10px 14px 8px; background: var(--np-bg);
    border-bottom: 1px solid var(--border);
  }
  .np-label { font-size: 10px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
  .np-ticker { overflow: hidden; white-space: nowrap; margin-bottom: 5px; }
  .np-name {
    font-family: 'Orbitron', monospace; font-size: 19px; font-weight: 700;
    color: var(--text);
    display: inline-block; animation: ticker 15s linear infinite; animation-play-state: paused;
    letter-spacing: .5px;
  }
  .np-name.running { animation-play-state: running; }
  @keyframes ticker { 0%{transform:translateX(100%)} 100%{transform:translateX(-100%)} }
  .np-meta {
    display: flex; gap: 10px; font-size: 11px; color: var(--dim); letter-spacing: 1px;
    align-items: center; flex-wrap: wrap; font-weight: 600;
  }
  .np-meta span { color: var(--text); }
  .np-sep { color: var(--border); }

  /* ── TIME BAR ───────────────────────────── */
  .time-bar {
    padding: 8px 14px; background: var(--np-bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .time-display {
    font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700;
    color: var(--accent); min-width: 72px; letter-spacing: 2px; flex-shrink: 0;
  }
  .seek-track {
    flex: 1; height: 4px; background: var(--seek-bg); border-radius: 2px;
    position: relative; cursor: pointer; overflow: visible;
  }
  .seek-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px; width: 0%; transition: width .5s linear; position: relative;
  }
  .seek-fill::after {
    content: ''; position: absolute; right: -5px; top: -3px;
    width: 10px; height: 10px; background: var(--text); border-radius: 50%;
    box-shadow: 0 0 5px var(--accent); display: none;
  }
  .seek-track:hover .seek-fill::after { display: block; }
  .vol-group { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--dim); letter-spacing: 1px; flex-shrink: 0; font-weight: 600; }
  input[type=range] {
    appearance: none; -webkit-appearance: none; width: 60px; height: 3px;
    background: var(--seek-bg); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }

  /* ── CONTROLS ───────────────────────────── */
  .controls {
    padding: 10px 14px; background: var(--ctrl-bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn {
    background: var(--panel2); border: 1px solid var(--border);
    color: var(--dim); font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 1px; cursor: pointer;
    padding: 7px 12px; border-radius: 2px; transition: all .15s;
    display: flex; align-items: center; justify-content: center;
    gap: 5px; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(.96); }
  .btn-play {
    background: var(--panel2); border-color: var(--border);
    color: var(--text); padding: 8px 22px;
    font-size: 13px; letter-spacing: 1px;
  }
  .btn-play:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon { font-size: 14px; padding: 7px 10px; }
  .btn.active { border-color: var(--accent2); color: var(--accent2); background: color-mix(in srgb,var(--accent2) 10%,var(--panel)); }
  .btn-sm { padding: 5px 9px; font-size: 10px; letter-spacing: 1.5px; font-weight: 600; }

  /* Hidden JS-compat buttons (Shuffle, Repeat, EQ — logic preserved, UI removed) */
  .toggle-group { display: none !important; }

  /* ── TAB + SEARCH COMBINED ROW ──────────── */
  .tab-search-row {
    display: flex; align-items: stretch;
    background: var(--tab-bg); border-bottom: 1px solid var(--border);
    min-height: 36px;
  }
  .tab-bar { display: flex; border-right: 1px solid var(--border); flex-shrink: 0; }
  .tab {
    padding: 8px 11px;
    font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 1.5px;
    color: var(--dim); cursor: pointer; border: none; background: none;
    text-align: center; text-transform: uppercase;
    border-bottom: 2px solid transparent; transition: all .2s;
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
    font-weight: 600;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); background: var(--tab-active); }
  .tab.fav-tab.active { color: var(--fav); border-bottom-color: var(--fav); }
  .tab-badge {
    font-size: 10px; padding: 1px 5px;
    background: var(--subdim); border-radius: 8px; color: var(--dim);
    transition: all .2s; font-weight: 600;
  }
  .tab.active .tab-badge { background: color-mix(in srgb,var(--accent) 20%,transparent); color: var(--accent); }
  .tab.fav-tab.active .tab-badge { background: color-mix(in srgb,var(--fav) 20%,transparent); color: var(--fav); }
  .search-area {
    flex: 1; display: flex; align-items: center; gap: 6px;
    padding: 5px 10px;
  }
  .search-wrap { flex: 1; position: relative; }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 11px; pointer-events: none; }
  input[type=text] {
    width: 100%; background: var(--subdim); border: 1px solid var(--border);
    color: var(--text); font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: .5px; padding: 5px 8px 5px 26px;
    outline: none; border-radius: 2px; transition: border-color .2s;
  }
  input[type=text]:focus { border-color: var(--accent); box-shadow: 0 0 6px color-mix(in srgb,var(--accent) 15%,transparent); }
  input[type=text]::placeholder { color: var(--dim); }
  .btn-search {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    letter-spacing: 1.5px; padding: 5px 10px; white-space: nowrap; font-weight: 600;
  }

  /* ── PLAYLIST HEADER ────────────────────── */
  .playlist-header {
    padding: 4px 14px; background: var(--tab-bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .pl-label { font-size: 10px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; font-weight: 600; }
  .pl-count { font-size: 10px; color: var(--accent); font-weight: 600; }

  /* ── PLAYLIST ───────────────────────────── */
  .playlist { height: 170px; overflow-y: auto; background: var(--pl-bg); }
  .playlist::-webkit-scrollbar { width: 3px; }
  .playlist::-webkit-scrollbar-track { background: var(--viz-bg); }
  .playlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .playlist::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .pl-item {
    display: flex; align-items: center;
    padding: 7px 12px 7px 14px; gap: 7px;
    border-bottom: 1px solid var(--tab-bg);
    cursor: pointer; transition: background .1s; position: relative;
  }
  .pl-item:hover { background: var(--pl-hover); }
  .pl-item.active { background: var(--pl-active); border-left: 2px solid var(--accent); padding-left: 12px; }
  .pl-item.active .pl-item-name { color: var(--accent); }

  .pl-num { font-size: 10px; color: var(--dim); min-width: 18px; text-align: right; flex-shrink: 0; font-weight: 600; }
  .pl-item.active .pl-num { color: var(--green); }
  .pl-item-info { flex: 1; overflow: hidden; min-width: 0; }
  .pl-item-name {
    font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; letter-spacing: .5px; font-weight: bold;
    font-family: 'Orbitron', monospace;
  }
  .pl-item-sub { font-size: 10px; color: var(--dim); margin-top: 2px; letter-spacing: .5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }

  .pl-badge {
    font-size: 10px; padding: 2px 5px;
    background: var(--tab-bg); border: 1px solid var(--border);
    color: var(--dim); border-radius: 2px; letter-spacing: 1px; flex-shrink: 0; font-weight: 600;
  }
  .pl-item.active .pl-badge { border-color: var(--accent); color: var(--accent); }

  /* + FAV button */
  .pl-fav {
    font-size: 10px; letter-spacing: .5px;
    color: var(--dim); background: var(--tab-bg);
    border: 1px solid var(--border); border-radius: 2px;
    cursor: pointer; padding: 3px 7px;
    opacity: 1; transition: color .15s, border-color .15s, box-shadow .15s;
    flex-shrink: 0; font-family: 'Share Tech Mono', monospace; white-space: nowrap;
    margin-left: 4px; font-weight: 600;
  }
  .pl-fav:hover { color: var(--fav) !important; border-color: var(--fav) !important; box-shadow: var(--glowfav); }
  .pl-fav.is-fav { color: var(--fav); border-color: var(--fav); }

  .pl-edit {
    font-size: 12px; color: var(--dim); background: none; border: none;
    cursor: pointer; padding: 2px 4px; opacity: 1;
    transition: color .15s; flex-shrink: 0;
    margin-left: 2px;
  }
  .pl-edit:hover { color: var(--accent); }

  /* remove button */
  .pl-remove {
    font-size: 12px; color: var(--dim); background: none; border: none;
    cursor: pointer; padding: 2px 4px; opacity: 0;
    transition: opacity .15s, color .15s; flex-shrink: 0;
  }
  .pl-item:hover .pl-remove { opacity: 1; }
  .pl-remove:hover { color: #e04040; }

  /* empty / loading */
  .pl-empty {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--dim); font-size: 10px; letter-spacing: 2px; gap: 8px;
  }
  .pl-empty-icon { font-size: 28px; opacity: .3; }
  .pl-empty-hint { font-size: 10px; color: var(--dim); margin-top: 2px; }
  .pl-loading {
    height: 100%; display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 10px; letter-spacing: 2px; gap: 10px;
  }
  .spinner { width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite; }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* EQ panel — hidden, kept in DOM for JS compatibility */
  .eq-panel { padding: 10px 14px; background: var(--tab-bg); border-top: 1px solid var(--border); display: none; }
  .eq-panel.open { display: block; }
  .eq-label { font-size: 8px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-bottom: 10px; }
  .eq-bars { display: flex; align-items: flex-end; gap: 6px; height: 50px; }
  .eq-band { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .eq-freq { font-size:7px; color:var(--dim); white-space:nowrap; }
  .eq-track {
    flex:1; background:var(--seek-bg); border-radius:2px; cursor:pointer;
    position:relative; height:40px; display:flex; align-items:flex-end; overflow:hidden;
  }
  .eq-fill { width:100%; background:linear-gradient(to top,var(--accent),var(--green)); border-radius:2px; transition:height .1s; }

  /* ── FOOTER ─────────────────────────────── */
  .footer {
    padding: 8px 14px; background: var(--pl-footer); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .footer-actions { display: flex; gap: 5px; }
  .footer-meta { font-size: 10px; color: var(--dim); letter-spacing: 1px; white-space: nowrap; font-weight: 600; }
  .footer-meta span { color: var(--text); }

  /* ── STATION CARD ───────────────────────── */
  .station-card {
    min-height: 86px; background: var(--viz-bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 10px 14px; gap: 14px;
  }
  .sc-idle {
    width: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--dim); font-size: 10px; letter-spacing: 2px; gap: 6px;
    opacity: .4; font-weight: 600;
  }
  .sc-idle-icon { font-size: 22px; }
  .sc-art {
    flex-shrink: 0; width: 62px; height: 62px;
    border-radius: 6px; overflow: hidden;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    background: var(--subdim);
  }
  .sc-favicon { width: 100%; height: 100%; object-fit: cover; }
  .sc-initials {
    width: 62px; height: 62px;
    background: var(--subdim); color: var(--accent);
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: 18px; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center;
  }
  .sc-info {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column; gap: 7px;
  }
  .sc-meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .sc-meta-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 2px;
    background: var(--subdim); color: var(--dim);
    border: 1px solid var(--border); letter-spacing: .5px; font-weight: 600;
  }
  .sc-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .sc-tag {
    font-size: 9px; padding: 2px 7px; border-radius: 10px;
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
    letter-spacing: .5px; font-weight: 600; text-transform: uppercase;
    white-space: nowrap;
  }
  .sc-link {
    font-size: 15px; text-decoration: none; opacity: .7;
    transition: opacity .15s; line-height: 1;
  }
  .sc-link:hover { opacity: 1; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-title">SPARKY RADIO</div>
    <div class="header-right">
      <div class="theme-toggle" id="themeToggle" title="Toggle light / dark mode">
        <span class="toggle-icon">🌙</span>
        <div class="toggle-track" id="toggleTrack"><div class="toggle-thumb"></div></div>
        <span class="toggle-icon">☀️</span>
      </div>
      <div class="status-cluster">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">IDLE</span>
      </div>
    </div>
  </div>

  <!-- VISUALIZER (compact 28px strip) -->
  <div class="visualizer">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>

<audio id="audioEl" crossorigin="anonymous"></audio>

<script>
// ══ STATE ══════════════════════════════════
const audioEl = document.getElementById('audioEl');
let stations   = [];
let currentIdx = -1;
let activeTab  = 'stations';
let currentSrc = null;   // the station object currently loaded
let isPlaying  = false;
let shuffle    = false;
let repeat     = false;
let elapsed    = 0, startTime = 0, timerInterval = null, rafId;
let audioCtx, analyser, srcNode;

// ══ THEME ══════════════════════════════════
// One-time migration: reset to dark mode for redesign v2
if (!localStorage.getItem('sparky_theme_v2')) {
  localStorage.setItem('sparky_theme', 'dark');
  localStorage.setItem('sparky_theme_v2', '1');
}
let isDark = localStorage.getItem('sparky_theme') !== 'light';

function applyTheme() {
  document.body.classList.toggle('light', !isDark);
  document.getElementById('toggleTrack').classList.toggle('on', !isDark);
  localStorage.setItem('sparky_theme', isDark ? 'dark' : 'light');
}
applyTheme();

document.getElementById('themeToggle').addEventListener('click', () => { isDark = !isDark; applyTheme(); });

// ══ FAVORITES (localStorage) ═══════════════
const FAV_KEY = 'sparky_favorites_v2';

function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch { return []; }
}
function saveFavs(f) { localStorage.setItem(FAV_KEY, JSON.stringify(f)); }

function isFav(st) {
  const u = st.url_resolved || st.url;
  return loadFavs().some(f => f.url === u);
}
function addFav(st) {
  const favs = loadFavs(), u = st.url_resolved || st.url;
  if (!favs.some(f => f.url === u)) {
    favs.push({ name: st.name, url: u, bitrate: st.bitrate, codec: st.codec, countrycode: st.countrycode, tags: st.tags||'' });
    saveFavs(favs);
  }
  refreshFavBadge();
}
function removeFavByUrl(u) {
  saveFavs(loadFavs().filter(f => f.url !== u));
  refreshFavBadge();
}
function refreshFavBadge() {
  const n = loadFavs().length;
  document.getElementById('favsBadge').textContent = n;
  document.getElementById('footerFavs').textContent = n;
}

// ══ TABS ═══════════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabStations').classList.toggle('active', tab === 'stations');
  document.getElementById('tabFavs').classList.toggle('active', tab === 'favs');
  document.getElementById('searchArea').style.display = tab === 'stations' ? '' : 'none';
  if (tab === 'stations') {
    document.getElementById('plLabel').textContent = 'Stations';
    renderStations();
  } else {
    document.getElementById('plLabel').textContent = 'Favorites';
    renderFavs();
  }
}

// ══ EQ ════════════════════════════════════
const EQ_FREQS = [60,170,310,600,1000,3000,6000,12000];
const EQ_LABELS= ['60Hz','170Hz','310Hz','600Hz','1kHz','3kHz','6kHz','12kHz'];
const eqNodes  = [], eqVals = new Array(8).fill(0);

EQ_LABELS.forEach((label, i) => {
  const band = document.createElement('div'); band.className = 'eq-band';
  band.innerHTML = `<div class="eq-track" id="eqT${i}"><div class="eq-fill" id="eqF${i}" style="height:50%"></div></div><div class="eq-freq">${label}</div>`;
  document.getElementById('eqBars').appendChild(band);
  document.getElementById('eqT'+i).addEventListener('click', e => {
    const r = document.getElementById('eqT'+i).getBoundingClientRect();
    const p = 1 - (e.clientY - r.top) / r.height;
    eqVals[i] = (p-.5)*24;
    document.getElementById('eqF'+i).style.height = (p*100)+'%';
    if (eqNodes[i]) eqNodes[i].gain.value = eqVals[i];
  });
});

// ══ AUDIO INIT ════════════════════════════
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser  = audioCtx.createAnalyser(); analyser.fftSize = 64;
  srcNode   = audioCtx.createMediaElementSource(audioEl);
  let chain = srcNode;
  EQ_FREQS.forEach((freq, i) => {
    const f = audioCtx.createBiquadFilter();
    f.type = i===0 ? 'lowshelf' : i===7 ? 'highshelf' : 'peaking';
    f.frequency.value = freq; f.gain.value = eqVals[i];
    eqNodes.push(f); chain.connect(f); chain = f;
  });
  chain.connect(analyser); analyser.connect(audioCtx.destination);
}

// ══ VISUALIZER ════════════════════════════
const vizBars = document.querySelectorAll('.visualizer .bar');
const vizData = new Uint8Array(28);

function drawViz() {
  rafId = requestAnimationFrame(drawViz);
  if (!analyser) return;
  analyser.getByteFrequencyData(vizData);
  vizBars.forEach((b,i) => { b.style.height = (4 + (vizData[i]||0)/255*28)+'px'; });
}
function idleViz() {
  cancelAnimationFrame(rafId); let t=0;
  (function tick(){ rafId=requestAnimationFrame(tick); t+=.05;
    vizBars.forEach((b,i)=>{ b.style.height=(4+Math.abs(Math.sin(t+i*.4))*5)+'px'; }); })();
}
idleViz();

// ══ STATUS ════════════════════════════════
function setStatus(state, txt) {
  document.getElementById('statusDot').className = 'dot '+({playing:'active',buffering:'buffering',error:'error'}[state]||'');
  document.getElementById('statusText').textContent = txt.toUpperCase();
}

// ══ TIMER ═════════════════════════════════
function startTimer() {
  clearInterval(timerInterval); startTime = Date.now() - elapsed*1000;
  timerInterval = setInterval(()=>{
    elapsed = (Date.now()-startTime)/1000;
    document.getElementById('timeDisplay').textContent =
      Math.floor(elapsed/60).toString().padStart(2,'0')+':'+Math.floor(elapsed%60).toString().padStart(2,'0');
    document.getElementById('seekFill').style.width = Math.min((elapsed/3600)*100,100)+'%';
  },500);
}
function stopTimer() {
  clearInterval(timerInterval); elapsed=0;
  document.getElementById('timeDisplay').textContent='00:00';
  document.getElementById('seekFill').style.width='0%';
}

// ══ NOW PLAYING ═══════════════════════════
function updateNowPlaying(st) {
  const nm = document.getElementById('npName');
  nm.textContent = st ? st.name : '— SELECT A STATION —';
  nm.className = 'np-name'+(st?' running':'');
  document.getElementById('npCountry').textContent = st?.countrycode||'—';
  document.getElementById('npBitrate').textContent = st?.bitrate ? st.bitrate+' kbps' : '—';
  document.getElementById('npCodec').textContent   = st?.codec||'—';
  updateStationCard(st);
}

// ══ STATION CARD ══════════════════════════
function updateStationCard(st) {
  const card = document.getElementById('stationCard');
  if (!card) return;
  if (!st) {
    card.innerHTML = '<div class="sc-idle"><div class="sc-idle-icon">📡</div><div>SELECT A STATION</div></div>';
    return;
  }
  const initials = (st.name||'?').replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase()||'??';
  const faviconHtml = st.favicon
    ? `<img src="${esc(st.favicon)}" class="sc-favicon" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="sc-initials" style="display:none">${initials}</div>`
    : `<div class="sc-initials">${initials}</div>`;
  const votes = st.votes ? `<span class="sc-meta-badge">▲ ${Number(st.votes).toLocaleString()}</span>` : '';
  const lang  = st.language ? `<span class="sc-meta-badge">${esc(st.language)}</span>` : '';
  const link  = st.homepage ? `<a href="${esc(st.homepage)}" target="_blank" class="sc-link" title="Station website">🔗</a>` : '';
  const tags  = (st.tags||'').split(',').slice(0,4).filter(t=>t.trim()).map(t=>`<span class="sc-tag">${esc(t.trim())}</span>`).join('');
  card.innerHTML = `<div class="sc-art">${faviconHtml}</div><div class="sc-info"><div class="sc-meta-row">${votes}${lang}${link}</div><div class="sc-tags">${tags}</div></div>`;
}

// ══ PLAYBACK ══════════════════════════════
function playStationObj(st) {
  if (!st) return;
  currentSrc = st;
  if (audioCtx?.state==='suspended') audioCtx.resume();
  initAudio();
  audioEl.pause();
  audioEl.src = st.url_resolved || st.url;
  audioEl.volume = document.getElementById('volSlider').value/100;
  setStatus('buffering','BUFFERING');
  updateNowPlaying(st);
  audioEl.play().then(()=>{
    isPlaying=true; setStatus('playing','CONNECTED');
    document.getElementById('btnPlay').innerHTML='&#9646;&#9646; PAUSE';
    startTimer(); cancelAnimationFrame(rafId); drawViz();
  }).catch(()=>{ setStatus('error','ERROR'); document.getElementById('btnPlay').innerHTML='&#9654; PLAY'; });
}

function playAtIndex(idx) {
  const list = activeTab==='favs' ? loadFavs() : stations;
  if (idx<0||idx>=list.length) return;
  currentIdx=idx; playStationObj(list[idx]);
  renderCurrent();
}

function stopPlayback() {
  audioEl.pause(); audioEl.src='';
  isPlaying=false; currentSrc=null;
  setStatus('','IDLE');
  document.getElementById('btnPlay').innerHTML='&#9654; PLAY';
  stopTimer(); idleViz(); renderCurrent();
  updateStationCard(null);
}

function renderCurrent() { activeTab==='stations' ? renderStations() : renderFavs(); }

// ══ RENDER STATIONS ═══════════════════════
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderStations() {
  const pl = document.getElementById('playlist');
  document.getElementById('plCount').textContent = stations.length+' FOUND';
  document.getElementById('stationsBadge').textContent = stations.length;
  document.getElementById('footerCount').textContent = stations.length;
  if (!stations.length) {
    pl.innerHTML='<div class="pl-empty"><div class="pl-empty-icon">📡</div><div>SEARCH TO DISCOVER STATIONS</div></div>'; return;
  }
  pl.innerHTML = stations.map((st,i) => {
    const url  = st.url_resolved||st.url;
    const actv = currentSrc && (currentSrc.url_resolved||currentSrc.url)===url && activeTab==='stations';
    const favd = isFav(st);
    return `<div class="pl-item${actv?' active':''}" data-idx="${i}">
      <div class="pl-num">${actv?'▶':(i+1).toString().padStart(2,'0')}</div>
      <div class="pl-item-info">
        <div class="pl-item-name">${esc(st.name)}</div>
        <div class="pl-item-sub">${esc(st.countrycode||'')}${st.tags?' · '+esc(st.tags.split(',').slice(0,3).join(', ')):''}
        </div>
      </div>
      <div class="pl-badge">${st.bitrate?st.bitrate+'k':'—'}</div>
      <button class="pl-fav${favd?' is-fav':''}" data-fav="${i}">${favd?'- FAV':'+ FAV'}</button>
      ${favd ? `<button class="pl-edit" data-edit="${i}" title="Edit favorite">✎</button>` : ''}
      <button class="pl-remove" data-rm="${i}">✕</button>
    </div>`;
  }).join('');

  pl.querySelectorAll('.pl-item').forEach(el=>{
    el.addEventListener('click', e=>{
      if(e.target.classList.contains('pl-fav')||e.target.classList.contains('pl-remove')||e.target.classList.contains('pl-edit')) return;
      currentIdx=parseInt(el.dataset.idx); activeTab='stations'; playStationObj(stations[currentIdx]); renderStations();
    });
  });
  pl.querySelectorAll('.pl-fav').forEach(btn=>{
    btn.addEventListener('click', e=>{ e.stopPropagation();
      const st=stations[parseInt(btn.dataset.fav)];
      isFav(st) ? removeFavByUrl(st.url_resolved||st.url) : addFav(st);
      renderStations();
    });
  });
  pl.querySelectorAll('.pl-remove').forEach(btn=>{
    btn.addEventListener('click', e=>{ e.stopPropagation();
      const idx=parseInt(btn.dataset.rm);
      if(currentSrc&&(currentSrc.url_resolved||currentSrc.url)===(stations[idx].url_resolved||stations[idx].url)) stopPlayback();
      stations.splice(idx,1);
      if(currentIdx>=idx) currentIdx=Math.max(-1,currentIdx-1);
      renderStations();
    });
  });
  pl.querySelectorAll('.pl-edit').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const idx = parseInt(btn.dataset.edit);
      const st = stations[idx];
      let favs = loadFavs();
      let favIdx = favs.findIndex(f => f.url === (st.url_resolved||st.url));
      if (favIdx !== -1) {
        openEditModal(favs[favIdx].name, favs[favIdx].url, (newName, newUrl) => {
          if (newName !== null && newUrl !== null) {
            favs[favIdx].name = newName;
            favs[favIdx].url = newUrl;
            saveFavs(favs);
            renderStations();
          }
        });
      }
    });
  });
}

// ══ RENDER FAVORITES ══════════════════════
function renderFavs() {
  const pl=document.getElementById('playlist'), favs=loadFavs();
  refreshFavBadge();
  document.getElementById('plCount').textContent = favs.length+' SAVED';
  if (!favs.length) {
    pl.innerHTML='<div class="pl-empty"><div class="pl-empty-icon">★</div><div>NO FAVORITES YET</div><div class="pl-empty-hint">HOVER A STATION AND CLICK + FAV</div></div>'; return;
  }
  pl.innerHTML = favs.map((st,i)=>{
    const actv = currentSrc&&(currentSrc.url_resolved||currentSrc.url)===st.url&&activeTab==='favs';
    return `<div class="pl-item${actv?' active':''}" data-idx="${i}">
      <div class="pl-num">${actv?'▶':(i+1).toString().padStart(2,'0')}</div>
      <div class="pl-item-info">
        <div class="pl-item-name">${esc(st.name)}</div>
        <div class="pl-item-sub">${esc(st.countrycode||'')}${st.tags?' · '+esc(st.tags.split(',').slice(0,3).join(', ')):''}
        </div>
      </div>
      <div class="pl-badge" style="color:var(--fav);border-color:var(--fav)">★</div>
      <button class="btn" style="min-width:28px;min-height:28px;padding:0;justify-content:center;" data-upfav="${i}" title="Move up"><span class="material-symbols-outlined">arrow_upward_alt</span></button>
      <button class="btn" style="min-width:28px;min-height:28px;padding:0;justify-content:center;" data-downfav="${i}" title="Move down"><span class="material-symbols-outlined">arrow_downward_alt</span></button>
      <button class="pl-edit" data-editfav="${i}" title="Edit favorite">✎</button>
      <button class="pl-remove" data-rmfav="${i}">✕</button>
    </div>`;
  }).join('');

  pl.querySelectorAll('.pl-item').forEach(el=>{
    el.addEventListener('click', e=>{
      if(e.target.classList.contains('pl-remove')||e.target.classList.contains('pl-edit')) return;
      currentIdx=parseInt(el.dataset.idx); activeTab='favs'; playStationObj(loadFavs()[currentIdx]); renderFavs();
    });
  });
  pl.querySelectorAll('[data-rmfav]').forEach(btn=>{
    btn.addEventListener('click', e=>{ e.stopPropagation();
      const f=loadFavs()[parseInt(btn.dataset.rmfav)];
      if(currentSrc&&(currentSrc.url_resolved||currentSrc.url)===f.url) stopPlayback();
      removeFavByUrl(f.url); renderFavs();
    });
  });
  pl.querySelectorAll('[data-upfav]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const idx = parseInt(btn.dataset.upfav);
      let favs = loadFavs();
      if (idx > 0) {
        [favs[idx-1], favs[idx]] = [favs[idx], favs[idx-1]];
        saveFavs(favs);
        renderFavs();
      }
    });
  });
  pl.querySelectorAll('[data-downfav]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const idx = parseInt(btn.dataset.downfav);
      let favs = loadFavs();
      if (idx < favs.length - 1) {
        [favs[idx+1], favs[idx]] = [favs[idx], favs[idx+1]];
        saveFavs(favs);
        renderFavs();
      }
    });
  });
  pl.querySelectorAll('[data-editfav]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const idx = parseInt(btn.dataset.editfav);
      let favs = loadFavs();
      if (favs[idx]) {
        openEditModal(favs[idx].name, favs[idx].url, (newName, newUrl) => {
          if (newName !== null && newUrl !== null) {
            favs[idx].name = newName;
            favs[idx].url = newUrl;
            saveFavs(favs);
            renderFavs();
          }
        });
      }
    });
  });
} // <-- This closing brace was missing, causing the script to break
</script>
<!-- Custom Edit Modal -->
<div class="modal-overlay" id="editModalOverlay" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
  <div class="modal" style="background:var(--panel);padding:24px 20px 16px 20px;border-radius:6px;box-shadow:0 8px 32px #0008;min-width:260px;max-width:90vw;">
    <div style="font-size:15px;font-weight:bold;margin-bottom:2px;">Edit Station</div>
    <label for="editStationName">Label</label>
    <input type="text" id="editStationName" maxlength="80" style="width:100%;margin-bottom:8px;">
    <label for="editStationUrl">URL</label>
    <input type="text" id="editStationUrl" maxlength="300" style="width:100%;margin-bottom:12px;">
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="modal-btn cancel" id="editModalCancel">Cancel</button>
      <button class="modal-btn" id="editModalSave">Save</button>
    </div>
  </div>
</div>
<script>
function openEditModal(name, url, onSave) {
  const overlay = document.getElementById('editModalOverlay');
  const nameInput = document.getElementById('editStationName');
  const urlInput = document.getElementById('editStationUrl');
  const saveBtn = document.getElementById('editModalSave');
  const cancelBtn = document.getElementById('editModalCancel');
  nameInput.value = name || '';
  urlInput.value = url || '';
  overlay.style.display = 'flex';
  nameInput.focus();
  function closeModal() {
    overlay.style.display = 'none';
    saveBtn.onclick = null;
    cancelBtn.onclick = null;
    overlay.onclick = null;
    document.onkeydown = null;
  }
  saveBtn.onclick = function(e) {
    e.preventDefault();
    closeModal();
    onSave(nameInput.value.trim(), urlInput.value.trim());
  };
  cancelBtn.onclick = function(e) {
    e.preventDefault();
    closeModal();
    onSave(null, null);
  };
  overlay.onclick = function(e) {
    if (e.target === overlay) { closeModal(); onSave(null, null); }
  };
  document.onkeydown = function(e) {
    if (e.key === 'Escape') { closeModal(); onSave(null, null); }
    if (e.key === 'Enter' && document.activeElement !== cancelBtn) { saveBtn.click(); }
  };
}
</script>
<script>
// ══ TRANSPORT ═════════════════════════════
document.getElementById('btnPlay').addEventListener('click', ()=>{
  if(audioCtx?.state==='suspended') audioCtx.resume();
  if(!isPlaying){
    if(currentSrc){
      audioEl.play().then(()=>{ isPlaying=true; setStatus('playing','CONNECTED');
        document.getElementById('btnPlay').innerHTML='&#9646;&#9646; PAUSE';
        startTimer(); cancelAnimationFrame(rafId); drawViz(); });
    } else {
      const list=activeTab==='favs'?loadFavs():stations;
      if(list.length){ currentIdx=0; playStationObj(list[0]); renderCurrent(); }
    }
  } else {
    audioEl.pause(); isPlaying=false; setStatus('','PAUSED');
    document.getElementById('btnPlay').innerHTML='&#9654; PLAY';
    clearInterval(timerInterval); idleViz();
  }
});

document.getElementById('btnStop').addEventListener('click', stopPlayback);

document.getElementById('btnNext').addEventListener('click', ()=>{
  const list=activeTab==='favs'?loadFavs():stations; if(!list.length) return;
  playAtIndex(shuffle?Math.floor(Math.random()*list.length):(currentIdx+1)%list.length);
});
document.getElementById('btnPrev').addEventListener('click', ()=>{
  const list=activeTab==='favs'?loadFavs():stations; if(!list.length) return;
  playAtIndex(shuffle?Math.floor(Math.random()*list.length):(currentIdx-1+list.length)%list.length);
});

document.getElementById('btnShuffle').addEventListener('click', function(){ shuffle=!shuffle; this.classList.toggle('active',shuffle); });
document.getElementById('btnRepeat').addEventListener('click', function(){ repeat=!repeat; this.classList.toggle('active',repeat); audioEl.loop=repeat; });
document.getElementById('btnEq').addEventListener('click', function(){
  const p=document.getElementById('eqPanel'); p.classList.toggle('open'); this.classList.toggle('active',p.classList.contains('open'));
});
document.getElementById('volSlider').addEventListener('input', function(){ audioEl.volume=this.value/100; });

audioEl.addEventListener('ended', ()=>{
  if(!repeat){ const list=activeTab==='favs'?loadFavs():stations; if(list.length) playAtIndex(shuffle?Math.floor(Math.random()*list.length):(currentIdx+1)%list.length); else stopPlayback(); }
});
audioEl.addEventListener('error', ()=>{ setStatus('error','STREAM ERROR'); isPlaying=false; document.getElementById('btnPlay').innerHTML='&#9654; PLAY'; idleViz(); });
audioEl.addEventListener('waiting', ()=>setStatus('buffering','BUFFERING'));
audioEl.addEventListener('playing', ()=>setStatus('playing','CONNECTED'));

// ══ SEARCH ════════════════════════════════
async function searchStations(q) {
  document.getElementById('playlist').innerHTML='<div class="pl-loading"><div class="spinner"></div>SCANNING...</div>';
  document.getElementById('plCount').textContent='SCANNING...';
  const servers=['de1.api.radio-browser.info','nl1.api.radio-browser.info','at1.api.radio-browser.info'];
  const srv=servers[Math.floor(Math.random()*servers.length)];
  try {
    const r=await fetch(`https://${srv}/json/stations/search?`+new URLSearchParams({name:q,limit:60,hidebroken:true,order:'clickcount',reverse:true}),{headers:{'User-Agent':'SPARKY-RadioPlayer/1.0'}});
    if(!r.ok) throw 0;
    stations=(await r.json()).filter(s=>s.url_resolved||s.url);
    renderStations();
  } catch {
    document.getElementById('playlist').innerHTML='<div class="pl-empty"><div class="pl-empty-icon">⚠</div><div>CONNECTION FAILED — RETRY</div></div>';
    document.getElementById('plCount').textContent='ERROR';
  }
}

document.getElementById('btnSearch').addEventListener('click', ()=>{
  const q=document.getElementById('searchInput').value.trim();
  if(q){ switchTab('stations'); searchStations(q); }
});
document.getElementById('searchInput').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ const q=e.target.value.trim(); if(q){ switchTab('stations'); searchStations(q); } }
});

document.getElementById('btnAdd').addEventListener('click', ()=>{
  const url=prompt('Enter stream URL:'); if(!url) return;
  const name=prompt('Station name:','Custom Station');
  stations.push({name:name||'Custom Station',url_resolved:url,url,bitrate:'',codec:'',countrycode:'',tags:''});
  switchTab('stations');
});
document.getElementById('btnRemove').addEventListener('click', ()=>{
  if(currentIdx<0) return;
  if(activeTab==='favs'){ const f=loadFavs()[currentIdx]; removeFavByUrl(f.url); stopPlayback(); renderFavs(); }
  else { stations.splice(currentIdx,1); stopPlayback(); renderStations(); }
});

// ══ INIT ══════════════════════════════════
refreshFavBadge();
searchStations('jazz');
</script>
